<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AguaControl">
<meta name="theme-color" content="#0c1a2e">
<title>AguaControl 💧</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #0ea5e9; --primary-dark: #0284c7; --dark: #0c1a2e;
  --success: #22c55e; --warn: #f59e0b; --danger: #ef4444;
  --bg: #f0f7ff; --card: #fff; --border: #e0f2fe;
  --text: #0c1a2e; --muted: #64748b;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
.header { background: linear-gradient(135deg, #0c1a2e 0%, #0e3460 60%, #0ea5e9 100%); padding: 16px 16px 12px; color: #fff; position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.header-title { font-weight: 900; font-size: 20px; flex: 1; }
.header-sub { font-size: 11px; opacity: .7; }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.stat-card { border-radius: 10px; padding: 6px 4px; text-align: center; border: 1px solid; }
.stat-val { font-weight: 900; font-size: 20px; }
.stat-lbl { font-size: 9px; color: #cce4f7; font-weight: 700; }

/* NAV */
.nav { display: flex; background: var(--dark); border-top: 1px solid #1e3a5f; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; }
.nav-btn { flex: 1; padding: 10px 4px 8px; background: none; border: none; color: rgba(255,255,255,.5); font-size: 9px; font-weight: 700; cursor: pointer; font-family: 'Nunito',sans-serif; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: color .2s; }
.nav-btn.active { color: var(--primary); }
.nav-icon { font-size: 20px; }

/* MAIN */
.main { max-width: 480px; margin: 0 auto; padding: 14px 12px 80px; }

/* CARDS */
.card { background: var(--card); border-radius: 16px; padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(14,165,233,.08); border: 1.5px solid var(--border); }
.card.urgent { border-color: #fdba74; }
.card.overdue { border-color: #fca5a5; background: #fff9f9; }
.card.success { border-color: #86efac; background: #f0fdf4; }
.card.warn { border-color: #fde68a; background: #fffbeb; }

/* CLIENT CARD */
.client-name { font-weight: 800; font-size: 16px; }
.client-addr { font-size: 12px; color: var(--muted); margin-top: 2px; }
.client-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
.client-info { font-size: 12px; color: var(--primary); font-weight: 700; }

/* BADGES */
.badge { padding: 2px 10px; border-radius: 999px; font-weight: 700; font-size: 11px; white-space: nowrap; }
.badge-ok { background: #dcfce7; color: #15803d; }
.badge-warn { background: #fef9c3; color: #a16207; }
.badge-urgent { background: #ffedd5; color: #ea580c; }
.badge-overdue { background: #fee2e2; color: #dc2626; }
.badge-today { background: #fef9c3; color: #b45309; }
.badge-paid { background: #dcfce7; color: #15803d; }
.badge-pending { background: #fee2e2; color: #dc2626; }

/* BUTTONS */
.btn { padding: 10px 16px; border-radius: 12px; border: none; font-weight: 800; font-size: 14px; cursor: pointer; font-family: 'Nunito',sans-serif; transition: opacity .15s; }
.btn:active { opacity: .8; }
.btn-primary { background: linear-gradient(90deg, #0ea5e9, #0284c7); color: #fff; }
.btn-success { background: linear-gradient(90deg, #22c55e, #16a34a); color: #fff; }
.btn-sm { padding: 5px 12px; font-size: 11px; border-radius: 999px; }
.btn-outline { background: #fff; border: 1.5px solid var(--border); color: var(--primary); }
.btn-danger { background: #fff; border: 1.5px solid #fca5a5; color: #dc2626; }
.btn-block { width: 100%; padding: 14px; border-radius: 16px; font-size: 15px; margin-bottom: 8px; }
.btn-gray { background: #f1f5f9; border: none; color: var(--muted); }

/* FAB */
.fab { position: fixed; bottom: 72px; right: 20px; width: 54px; height: 54px; border-radius: 50%; background: linear-gradient(135deg, #0ea5e9, #0284c7); color: #fff; border: none; font-size: 26px; cursor: pointer; box-shadow: 0 4px 20px rgba(14,165,233,.5); display: flex; align-items: center; justify-content: center; z-index: 50; }

/* FORM */
.page-header { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
.back-btn { background: none; border: none; font-size: 24px; cursor: pointer; padding: 4px; }
.page-title { font-weight: 900; font-size: 18px; flex: 1; }
.form-group { margin-bottom: 12px; }
.form-label { font-weight: 700; font-size: 13px; color: var(--primary); display: block; margin-bottom: 4px; }
.form-input { width: 100%; padding: 10px 14px; border-radius: 12px; border: 1.5px solid var(--border); font-size: 14px; font-family: 'Nunito',sans-serif; outline: none; background: #fff; }
.form-input:focus { border-color: var(--primary); }
textarea.form-input { resize: vertical; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* DETAIL */
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.detail-item .lbl { font-size: 11px; color: var(--muted); font-weight: 600; }
.detail-item .val { font-weight: 700; font-size: 14px; margin-top: 2px; }

/* FOTO */
.foto-preview { width: 100%; height: 160px; border-radius: 12px; object-fit: cover; margin-bottom: 8px; }
.foto-placeholder { width: 100%; height: 120px; border-radius: 12px; background: #f0f9ff; border: 2px dashed var(--border); display: flex; align-items: center; justify-content: center; flex-direction: column; color: var(--muted); font-size: 13px; gap: 6px; margin-bottom: 8px; cursor: pointer; }

/* HISTORY */
.history-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f1f5f9; }
.history-item:last-child { border-bottom: none; }
.history-date { font-size: 11px; color: var(--muted); white-space: nowrap; margin-top: 2px; min-width: 60px; }
.history-text { font-size: 13px; font-weight: 600; }

/* PAGO ROW */
.pago-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
.pago-row:last-child { border-bottom: none; }
.pago-info { flex: 1; }
.pago-nombre { font-weight: 700; font-size: 14px; }
.pago-fecha { font-size: 11px; color: var(--muted); }
.pago-monto { font-weight: 900; font-size: 16px; color: var(--success); }

/* STOCK */
.stock-big { font-weight: 900; font-size: 48px; text-align: center; line-height: 1; }
.stock-label { text-align: center; font-size: 13px; color: var(--muted); font-weight: 600; margin-top: 4px; }
.stock-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0; }
.stock-card { border-radius: 16px; padding: 16px; text-align: center; }

/* MAPA LINK */
.map-btn { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: #f0f9ff; border-radius: 12px; border: 1.5px solid var(--border); color: var(--primary); font-weight: 700; font-size: 13px; text-decoration: none; margin-top: 8px; }

/* CONFIRM DELETE */
.confirm-box { background: #fff1f2; border: 1.5px solid #fca5a5; border-radius: 14px; padding: 14px; text-align: center; margin-top: 12px; }
.confirm-btns { display: flex; gap: 8px; margin-top: 10px; }

/* EMPTY */
.empty { text-align: center; padding: 40px 0; color: var(--muted); }
.empty-icon { font-size: 48px; margin-bottom: 8px; }

/* SPINNER */
.spinner { width: 36px; height: 36px; border: 3px solid #bae6fd; border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; margin: 20px auto; }
@keyframes spin { to { transform: rotate(360deg); } }

/* TOAST */
.toast { position: fixed; bottom: 82px; left: 50%; transform: translateX(-50%); background: var(--dark); color: #fff; padding: 10px 20px; border-radius: 999px; font-weight: 700; font-size: 13px; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; max-width: 90vw; text-align: center; }
.toast.show { opacity: 1; }

/* SECTION TITLE */
.section-title { font-weight: 900; font-size: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

/* SETUP */
.setup { max-width: 480px; margin: 0 auto; padding: 24px 16px; }
.setup-card { background: #fff; border-radius: 20px; padding: 24px; box-shadow: 0 4px 20px rgba(14,165,233,.1); border: 1.5px solid var(--border); }

/* SEARCH */
.search-bar { margin-bottom: 10px; }
.search-bar input { width: 100%; padding: 10px 14px; border-radius: 12px; border: 1.5px solid var(--border); font-size: 14px; outline: none; font-family: 'Nunito',sans-serif; background: #fff; }
.filters { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; }
.filter-btn { padding: 5px 14px; border-radius: 999px; border: 1.5px solid var(--border); background: #fff; color: #0369a1; font-weight: 700; font-size: 12px; cursor: pointer; font-family: 'Nunito',sans-serif; white-space: nowrap; flex-shrink: 0; }
.filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* TABS */
.tabs { display: flex; background: #f0f9ff; border-radius: 12px; padding: 4px; margin-bottom: 14px; }
.tab { flex: 1; padding: 8px; border-radius: 10px; border: none; font-weight: 700; font-size: 13px; cursor: pointer; font-family: 'Nunito',sans-serif; background: none; color: var(--muted); }
.tab.active { background: #fff; color: var(--primary); box-shadow: 0 1px 4px rgba(0,0,0,.1); }

/* SUMMARY ROW */
.summary-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
.summary-row:last-child { border-bottom: none; }
.summary-key { color: var(--muted); font-weight: 600; }
.summary-val { font-weight: 800; }
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div id="app"></div>

<script>
// ============================================================
//  ESTADO GLOBAL
// ============================================================
const S = {
  view: 'setup',      // setup | lista | nuevo | detalle | editar | pagos | stock | reporte
  tab: 'clientes',   // nav tab
  clients: [],
  pagos: [],
  stock: { bidonesLlenos: 0, bidonesVacios: 0, historial: [] },
  selected: null,
  search: '',
  filter: 'todos',
  loading: false,
  syncing: false,
  scriptUrl: localStorage.getItem('aguacontrol_url') || '',
  showConfirmDelete: false,
  form: emptyForm(),
  pagoForm: emptyPagoForm(),
  stockForm: { llenos: 0, vacios: 0, nota: '' },
  detailTab: 'info',  // info | pagos | historial
};

function emptyForm() {
  return { nombre:'', telefono:'', direccion:'', barrio:'', fechaInicio: today(),
    bidones: 6, notas:'', precioPorEntrega: 0, fotoUrl: '' };
}
function emptyPagoForm() {
  return { clienteId: '', monto: '', concepto: 'Entrega mensual', fecha: today(), estado: 'pagado' };
}

// ============================================================
//  UTILS
// ============================================================
function today() { return new Date().toISOString().split('T')[0]; }
function addMonths(ds, n) { const d = new Date(ds); d.setMonth(d.getMonth()+n); return d.toISOString().split('T')[0]; }
function daysUntil(ds) { return Math.ceil((new Date(ds) - new Date(today())) / 864e5); }
function fmtDate(ds) { if (!ds) return '—'; const [y,m,d]=String(ds).split('-'); return `${d}/${m}/${y}`; }
function fmtMoney(n) { return '$' + Number(n||0).toLocaleString('es-AR'); }

function badgeHtml(days) {
  if (days < 0)  return `<span class="badge badge-overdue">Vencido ${Math.abs(days)}d</span>`;
  if (days === 0) return `<span class="badge badge-today">¡Hoy!</span>`;
  if (days <= 5)  return `<span class="badge badge-urgent">En ${days}d</span>`;
  if (days <= 10) return `<span class="badge badge-warn">En ${days}d</span>`;
  return `<span class="badge badge-ok">En ${days}d</span>`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function stats() {
  const v = S.clients.filter(c => daysUntil(c.proximaEntrega) < 0).length;
  const u = S.clients.filter(c => { const d=daysUntil(c.proximaEntrega); return d>=0&&d<=5; }).length;
  const ok = S.clients.filter(c => daysUntil(c.proximaEntrega) > 5).length;
  return { vencidos:v, urgentes:u, ok, total:S.clients.length };
}

function clienteDeuda(clienteId) {
  const pagosCliente = S.pagos.filter(p => p.clienteId == clienteId);
  return pagosCliente.filter(p => p.estado === 'pendiente').reduce((a,p) => a + Number(p.monto), 0);
}

function totalDeuda() {
  return S.clients.reduce((a,c) => a + clienteDeuda(c.id), 0);
}

function totalCobrado() {
  return S.pagos.filter(p => p.estado === 'pagado').reduce((a,p) => a + Number(p.monto), 0);
}

// ============================================================
//  API JSONP
// ============================================================
function jsonpCall(url) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*9999);
    const script = document.createElement('script');
    const timeout = setTimeout(() => {
      delete window[cb];
      if (script.parentNode) document.body.removeChild(script);
      reject(new Error('Timeout'));
    }, 15000);
    window[cb] = (data) => {
      clearTimeout(timeout); delete window[cb];
      if (script.parentNode) document.body.removeChild(script);
      resolve(data);
    };
    script.src = url + '&callback=' + cb;
    script.onerror = () => { clearTimeout(timeout); if (script.parentNode) document.body.removeChild(script); reject(new Error('Error de red')); };
    document.body.appendChild(script);
  });
}

async function apiCall(action, data) {
  let url = S.scriptUrl + '?action=' + action;
  if (data) url += '&data=' + encodeURIComponent(JSON.stringify(data));
  return jsonpCall(url);
}

async function fetchAll() {
  if (!S.scriptUrl) return;
  S.loading = true; render();
  try {
    const res = await apiCall('getAll');
    if (res.success) {
      S.clients = res.clients || [];
      S.pagos = res.pagos || [];
      S.stock = res.stock || { bidonesLlenos: 0, bidonesVacios: 0, historial: [] };
    } else showToast('⚠️ ' + (res.error||'Error'));
  } catch(e) { showToast('⚠️ ' + e.message); }
  S.loading = false; render();
}

async function saveClients() {
  S.syncing = true; render();
  try {
    const res = await apiCall('saveClients', S.clients);
    if (res.success) showToast('✅ Guardado');
    else showToast('⚠️ Error al guardar');
  } catch(e) { showToast('⚠️ ' + e.message); }
  S.syncing = false; render();
}

async function savePago(pago) {
  try {
    const res = await apiCall('savePago', pago);
    if (!res.success) showToast('⚠️ Error al guardar pago');
  } catch(e) { showToast('⚠️ ' + e.message); }
}

async function saveStockUpdate(data) {
  try { await apiCall('saveStock', data); } catch(e) { showToast('⚠️ ' + e.message); }
}

// ============================================================
//  ACCIONES
// ============================================================
function saveForm() {
  const f = S.form;
  if (!f.nombre.trim() || !f.direccion.trim()) { showToast('⚠️ Completá nombre y dirección'); return; }
  const proximaEntrega = addMonths(f.fechaInicio, 1);
  if (S.view === 'nuevo') {
    S.clients.push({ id: Date.now(), ...f, bidones: parseInt(f.bidones)||6,
      precioPorEntrega: parseFloat(f.precioPorEntrega)||0, proximaEntrega,
      historial: [{ fecha: f.fechaInicio, accion: `Alta — Dispenser + ${f.bidones} bidones` }] });
  } else {
    const idx = S.clients.findIndex(c => c.id === S.selected.id);
    if (idx >= 0) S.clients[idx] = { ...S.clients[idx], ...f, bidones: parseInt(f.bidones)||6,
      precioPorEntrega: parseFloat(f.precioPorEntrega)||0, proximaEntrega };
  }
  saveClients();
  S.view = 'lista'; S.form = emptyForm(); S.selected = null; render();
}

function registrarEntrega(id) {
  const idx = S.clients.findIndex(c => c.id === id); if (idx < 0) return;
  const c = S.clients[idx];
  S.clients[idx] = { ...c, proximaEntrega: addMonths(today(), 1),
    historial: [{ fecha: today(), accion: `Entrega — ${c.bidones} bidones` }, ...(c.historial||[])] };
  if (S.selected?.id === id) S.selected = S.clients[idx];
  // Si tiene precio, crear pago pendiente automático
  if (c.precioPorEntrega > 0) {
    const pago = { id: Date.now(), clienteId: c.id, clienteNombre: c.nombre,
      fecha: today(), monto: c.precioPorEntrega, concepto: `Entrega ${fmtDate(today())}`, estado: 'pendiente' };
    S.pagos.push(pago);
    savePago(pago);
  }
  // Actualizar stock
  if (S.stock.bidonesLlenos >= c.bidones) {
    S.stock.bidonesLlenos -= c.bidones;
    S.stock.bidonesVacios += c.bidones;
    saveStockUpdate({ fecha: today(), bidonesLlenos: S.stock.bidonesLlenos, bidonesVacios: S.stock.bidonesVacios, nota: `Entrega a ${c.nombre}` });
  }
  saveClients(); render(); showToast('✅ Entrega registrada');
}

function marcarPagado(pagoId) {
  const idx = S.pagos.findIndex(p => p.id === pagoId); if (idx < 0) return;
  S.pagos[idx].estado = 'pagado';
  savePago({ ...S.pagos[idx] });
  // Reemplazar en lista local
  showToast('✅ Pago registrado');
  render();
}

function agregarPagoManual() {
  const f = S.pagoForm;
  if (!f.clienteId || !f.monto) { showToast('⚠️ Completá cliente y monto'); return; }
  const c = S.clients.find(x => x.id == f.clienteId);
  const pago = { id: Date.now(), clienteId: parseInt(f.clienteId), clienteNombre: c?.nombre||'',
    fecha: f.fecha, monto: parseFloat(f.monto), concepto: f.concepto, estado: f.estado };
  S.pagos.push(pago);
  savePago(pago);
  S.pagoForm = emptyPagoForm();
  showToast('✅ Pago agregado');
  render();
}

function actualizarStock() {
  const f = S.stockForm;
  S.stock.bidonesLlenos = parseInt(f.llenos)||0;
  S.stock.bidonesVacios = parseInt(f.vacios)||0;
  saveStockUpdate({ fecha: today(), bidonesLlenos: S.stock.bidonesLlenos, bidonesVacios: S.stock.bidonesVacios, nota: f.nota });
  S.stockForm = { llenos: 0, vacios: 0, nota: '' };
  showToast('✅ Stock actualizado');
  render();
}

function deleteClient(id) {
  S.clients = S.clients.filter(c => c.id !== id);
  S.showConfirmDelete = false; S.view = 'lista'; S.selected = null;
  saveClients(); render();
}

function filteredClients() {
  let list = [...S.clients];
  if (S.search.trim()) list = list.filter(c =>
    c.nombre.toLowerCase().includes(S.search.toLowerCase()) ||
    c.direccion.toLowerCase().includes(S.search.toLowerCase()) ||
    (c.barrio||'').toLowerCase().includes(S.search.toLowerCase()));
  if (S.filter === 'urgente') list = list.filter(c => { const d=daysUntil(c.proximaEntrega); return d>=0&&d<=5; });
  if (S.filter === 'vencido') list = list.filter(c => daysUntil(c.proximaEntrega) < 0);
  if (S.filter === 'deuda') list = list.filter(c => clienteDeuda(c.id) > 0);
  list.sort((a,b) => new Date(a.proximaEntrega) - new Date(b.proximaEntrega));
  return list;
}

// ============================================================
//  RENDER
// ============================================================
function render() { document.getElementById('app').innerHTML = buildApp(); bindEvents(); }

function buildApp() {
  if (S.view === 'setup') return buildSetup();
  const s = stats();
  return `
    <div class="header">
      <div class="header-top">
        <span style="font-size:26px">💧</span>
        <div><div class="header-title">AguaControl</div><div class="header-sub">Gestión de clientes</div></div>
        ${S.syncing ? '<span style="margin-left:auto;font-size:11px;opacity:.7">☁️ Guardando...</span>' : ''}
      </div>
      <div class="stats">
        ${[{l:'Clientes',v:s.total,c:'#38bdf8',bg:'rgba(56,189,248,.15)'},{l:'Urgentes',v:s.urgentes,c:'#fb923c',bg:'rgba(251,146,60,.15)'},{l:'Vencidos',v:s.vencidos,c:'#f87171',bg:'rgba(248,113,113,.15)'},{l:'Deuda',v:fmtMoney(totalDeuda()),c:'#a78bfa',bg:'rgba(167,139,250,.15)'}]
          .map(x=>`<div class="stat-card" style="background:${x.bg};border-color:${x.c}33"><div class="stat-val" style="color:${x.c};font-size:${x.l==='Deuda'?'12px':'20px'}">${x.v}</div><div class="stat-lbl">${x.l}</div></div>`).join('')}
      </div>
    </div>
    <div class="main">
      ${S.tab === 'clientes' && S.view === 'lista' ? buildLista() : ''}
      ${S.tab === 'clientes' && (S.view==='nuevo'||S.view==='editar') ? buildForm() : ''}
      ${S.tab === 'clientes' && S.view === 'detalle' ? buildDetalle() : ''}
      ${S.tab === 'pagos' ? buildPagos() : ''}
      ${S.tab === 'stock' ? buildStock() : ''}
      ${S.tab === 'reporte' ? buildReporte() : ''}
    </div>

// REPORTE
function buildReporte() {
  const entregasEstesMes = S.clients.reduce((a,c) => a + (c.historial||[]).filter(h=>h.fecha&&h.fecha.startsWith(today().slice(0,7))).length, 0);
  const bidonesEntregados = S.clients.reduce((a,c) => {
    const ents = (c.historial||[]).filter(h=>h.fecha&&h.fecha.startsWith(today().slice(0,7)));
    return a + ents.length * c.bidones;
  }, 0);
  const ingresosMes = S.pagos.filter(p=>p.estado==='pagado'&&p.fecha&&p.fecha.startsWith(today().slice(0,7))).reduce((a,p)=>a+Number(p.monto),0);
  const clientesConDeuda = S.clients.filter(c=>clienteDeuda(c.id)>0);
  const proximos = filteredClients().filter(c=>{const d=daysUntil(c.proximaEntrega);return d>=0&&d<=7;});

  return `
    <div class="section-title">📊 Reporte del mes</div>
    <div class="card">
      <div class="section-title" style="font-size:14px">📅 ${new Date().toLocaleString('es-AR',{month:'long',year:'numeric'})}</div>
      ${[
        ['🚚 Entregas realizadas', entregasEstesMes],
        ['🫙 Bidones entregados', bidonesEntregados],
        ['💰 Ingresos cobrados', fmtMoney(ingresosMes)],
        ['🔴 Clientes con deuda', clientesConDeuda.length],
        ['💸 Total deuda pendiente', fmtMoney(totalDeuda())],
        ['👥 Total clientes', S.clients.length],
      ].map(([k,v])=>`<div class="summary-row"><span class="summary-key">${k}</span><span class="summary-val">${v}</span></div>`).join('')}
    </div>
    ${proximos.length>0?`
      <div class="card">
        <div class="section-title">📅 Próximas entregas (7 días)</div>
        ${proximos.map(c=>`<div class="summary-row">
          <span class="summary-key">${c.nombre}</span>
          <span>${badgeHtml(daysUntil(c.proximaEntrega))}</span>
        </div>`).join('')}
      </div>`:''}
    ${clientesConDeuda.length>0?`
      <div class="card">
        <div class="section-title">💰 Clientes con deuda</div>
        ${clientesConDeuda.map(c=>`<div class="summary-row">
          <span class="summary-key">${c.nombre}</span>
          <span class="summary-val" style="color:var(--danger)">${fmtMoney(clienteDeuda(c.id))}</span>
        </div>`).join('')}
      </div>`:''}`;
}

// ============================================================
//  BIND EVENTS
// ============================================================
function bindEvents() {
  // NAV
  document.querySelectorAll('[data-tab]').forEach(btn => {
    btn.onclick = () => { S.tab = btn.dataset.tab; if(S.tab!=='clientes') S.view='lista'; render(); };
  });

  // SETUP
  const connectBtn = document.getElementById('connectBtn');
  if (connectBtn) connectBtn.onclick = () => {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) { showToast('⚠️ Ingresá la URL'); return; }
    S.scriptUrl = url; localStorage.setItem('aguacontrol_url', url);
    S.view = 'lista'; fetchAll();
  };
  const skipBtn = document.getElementById('skipBtn');
  if (skipBtn) skipBtn.onclick = () => { S.view='lista'; fetchAll(); };

  // FAB
  const fab = document.getElementById('fabBtn');
  if (fab) fab.onclick = () => { S.form=emptyForm(); S.view='nuevo'; render(); };

  // SEARCH & FILTER
  const si = document.getElementById('searchInput');
  if (si) si.oninput = e => { S.search=e.target.value; render(); };
  document.querySelectorAll('[data-filter]').forEach(btn => { btn.onclick = ()=>{ S.filter=btn.dataset.filter; render(); }; });
  const rb = document.getElementById('refreshBtn');
  if (rb) rb.onclick = fetchAll;

  // CLIENT CARDS
  document.querySelectorAll('[data-action="open"]').forEach(card => {
    card.onclick = e => {
      if (e.target.closest('[data-action="entregar"]')) return;
      S.selected = S.clients.find(c=>c.id===parseInt(card.dataset.id));
      S.showConfirmDelete=false; S.detailTab='info'; S.view='detalle'; render();
    };
  });
  document.querySelectorAll('[data-action="entregar"]').forEach(btn => {
    btn.onclick = e => { e.stopPropagation(); registrarEntrega(parseInt(btn.dataset.id)); };
  });

  // FORM FIELDS
  document.querySelectorAll('[data-field]').forEach(input => {
    input.oninput = e => { const k=input.dataset.field; S.form[k]=k==='bidones'?(parseInt(e.target.value)||6):k==='precioPorEntrega'?(parseFloat(e.target.value)||0):e.target.value; };
  });
  const saveBtn = document.getElementById('saveBtn');
  if (saveBtn) saveBtn.onclick = saveForm;

  // BACK
  const backBtn = document.getElementById('backBtn');
  if (backBtn) backBtn.onclick = () => { S.view='lista'; S.selected=null; S.form=emptyForm(); render(); };

  // EDIT
  const editBtn = document.getElementById('editBtn');
  if (editBtn) editBtn.onclick = () => {
    const c=S.selected;
    S.form={nombre:c.nombre,telefono:c.telefono||'',direccion:c.direccion,barrio:c.barrio||'',
      fechaInicio:addMonths(c.proximaEntrega,-1),bidones:c.bidones,notas:c.notas||'',
      precioPorEntrega:c.precioPorEntrega||0,fotoUrl:c.fotoUrl||''};
    S.view='editar'; render();
  };

  // ENTREGAR (detalle)
  const entBtn = document.getElementById('entregarBtn');
  if (entBtn) entBtn.onclick = () => registrarEntrega(S.selected.id);

  // DETAIL TABS
  document.querySelectorAll('[data-dtab]').forEach(btn => {
    btn.onclick = () => { S.detailTab=btn.dataset.dtab; render(); };
  });

  // COBRAR PAGO (desde detalle o pagos global)
  document.querySelectorAll('[data-pagoid]').forEach(btn => {
    btn.onclick = () => marcarPagado(parseInt(btn.dataset.pagoid));
  });

  // AGREGAR PAGO (desde detalle)
  const addPagoBtn = document.getElementById('addPagoBtn');
  if (addPagoBtn) addPagoBtn.onclick = () => {
    S.pagoForm.clienteId = S.selected.id;
    S.pagoForm.monto = document.getElementById('pagoMonto').value;
    S.pagoForm.estado = document.getElementById('pagoEstado').value;
    S.pagoForm.concepto = document.getElementById('pagoConcepto').value;
    agregarPagoManual();
  };

  // AGREGAR PAGO GLOBAL
  const globalAddPagoBtn = document.getElementById('globalAddPagoBtn');
  if (globalAddPagoBtn) globalAddPagoBtn.onclick = () => {
    S.pagoForm.clienteId = document.getElementById('pagoClienteSel').value;
    S.pagoForm.monto = document.getElementById('globalPagoMonto').value;
    S.pagoForm.estado = document.getElementById('globalPagoEstado').value;
    S.pagoForm.concepto = document.getElementById('globalPagoConcepto').value;
    agregarPagoManual();
  };

  // STOCK
  const saveStockBtn = document.getElementById('saveStockBtn');
  if (saveStockBtn) saveStockBtn.onclick = () => {
    S.stockForm.llenos = document.getElementById('stockLlenos').value;
    S.stockForm.vacios = document.getElementById('stockVacios').value;
    S.stockForm.nota = document.getElementById('stockNota').value;
    actualizarStock();
  };

  // DELETE
  const delBtn = document.getElementById('deleteBtn');
  if (delBtn) delBtn.onclick = () => { S.showConfirmDelete=true; render(); };
  const cancelDel = document.getElementById('cancelDeleteBtn');
  if (cancelDel) cancelDel.onclick = () => { S.showConfirmDelete=false; render(); };
  const confirmDel = document.getElementById('confirmDeleteBtn');
  if (confirmDel) confirmDel.onclick = () => deleteClient(S.selected.id);
}

// INIT
if (S.scriptUrl) { S.view='lista'; render(); fetchAll(); }
else render();
</script>
</body>
</html>
