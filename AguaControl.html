<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AguaControl">

<title>AguaControl 💧</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--p:#0ea5e9;--pd:#0284c7;--dark:#0c1a2e;--ok:#22c55e;--warn:#f59e0b;--danger:#ef4444;--bg:#f0f7ff;--card:#fff;--border:#e0f2fe;--text:#0c1a2e;--muted:#64748b;--lorenzo:#8b5cf6;--renato:#f97316;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#0c1a2e 0%,#0e3460 60%,#0ea5e9 100%);padding:12px 14px 10px;color:#fff;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.header-title{font-weight:900;font-size:18px;flex:1}
.user-selector{display:flex;gap:4px;margin-bottom:8px}
.user-btn{flex:1;padding:6px 10px;border-radius:10px;border:1.5px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);font-weight:700;font-size:11px;cursor:pointer;font-family:'Nunito',sans-serif;display:flex;align-items:center;justify-content:center;gap:4px}
.user-btn.active{background:#fff;color:var(--dark);border-color:#fff}
.user-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.sc{border-radius:10px;padding:5px 3px;text-align:center;border:1px solid}
.sv{font-weight:900;font-size:15px}
.sl{font-size:8px;color:#cce4f7;font-weight:700}
.nav{display:flex;background:var(--dark);border-top:1px solid #1e3a5f;position:fixed;bottom:0;left:0;right:0;z-index:100}
.nb{flex:1;padding:8px 2px 6px;background:none;border:none;color:rgba(255,255,255,.45);font-size:8px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;display:flex;flex-direction:column;align-items:center;gap:2px}
.nb.active{color:var(--p)}
.ni{font-size:17px}
.main{max-width:480px;margin:0 auto;padding:12px 12px 75px}
.card{background:var(--card);border-radius:14px;padding:12px 14px;margin-bottom:9px;box-shadow:0 2px 8px rgba(14,165,233,.07);border:1.5px solid var(--border)}
.card.urg{border-color:#fdba74}
.card.ovd{border-color:#fca5a5;background:#fff9f9}
.card.ok-c{border-color:#86efac;background:#f0fdf4}
.card.wn-c{border-color:#fde68a;background:#fffbeb}
.card.paused{opacity:.6;border-color:#cbd5e1}
.badge{padding:2px 9px;border-radius:999px;font-weight:700;font-size:10px;white-space:nowrap}
.b-ok{background:#dcfce7;color:#15803d}
.b-warn{background:#fef9c3;color:#a16207}
.b-urg{background:#ffedd5;color:#ea580c}
.b-ovd{background:#fee2e2;color:#dc2626}
.b-today{background:#fef9c3;color:#b45309}
.b-paid{background:#dcfce7;color:#15803d}
.b-pend{background:#fee2e2;color:#dc2626}
.b-fc{background:#dbeafe;color:#1d4ed8}
.b-nat{background:#dcfce7;color:#15803d}
.b-paused{background:#f1f5f9;color:#64748b}
.b-lorenzo{background:#ede9fe;color:#6d28d9}
.b-renato{background:#ffedd5;color:#c2410c}
.b-efectivo{background:#dcfce7;color:#15803d}
.b-transf{background:#dbeafe;color:#1d4ed8}
.b-done{background:#dcfce7;color:#15803d;text-decoration:line-through}
.btn{padding:9px 14px;border-radius:11px;border:none;font-weight:800;font-size:13px;cursor:pointer;font-family:'Nunito',sans-serif;transition:opacity .15s}
.btn:active{opacity:.75}
.bp{background:linear-gradient(90deg,#0ea5e9,#0284c7);color:#fff}
.bs{background:linear-gradient(90deg,#22c55e,#16a34a);color:#fff}
.bo{background:linear-gradient(90deg,#f59e0b,#d97706);color:#fff}
.btn-sm{padding:4px 10px;font-size:10px;border-radius:999px}
.btn-out{background:#fff;border:1.5px solid var(--border);color:var(--p)}
.btn-danger{background:#fff;border:1.5px solid #fca5a5;color:#dc2626}
.btn-blk{width:100%;padding:12px;border-radius:14px;font-size:14px;margin-bottom:7px}
.btn-gr{background:#f1f5f9;border:none;color:var(--muted)}
.fab{position:fixed;bottom:68px;right:18px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 18px rgba(14,165,233,.5);display:flex;align-items:center;justify-content:center;z-index:50}
.ph{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.bb{background:none;border:none;font-size:22px;cursor:pointer;padding:4px}
.pt{font-weight:900;font-size:17px;flex:1}
.fg{margin-bottom:10px}
.fl{font-weight:700;font-size:11px;color:var(--p);display:block;margin-bottom:3px}
.fi{width:100%;padding:8px 12px;border-radius:11px;border:1.5px solid var(--border);font-size:13px;font-family:'Nunito',sans-serif;outline:none;background:#fff}
.fi:focus{border-color:var(--p)}
textarea.fi{resize:vertical}
select.fi{appearance:none}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.di .dl{font-size:10px;color:var(--muted);font-weight:600}
.di .dv{font-weight:800;font-size:13px;margin-top:1px}
.fp{width:100%;height:140px;border-radius:11px;object-fit:cover;margin-bottom:8px}
.hi{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid #f1f5f9}
.hi:last-child{border-bottom:none}
.hd{font-size:10px;color:var(--muted);white-space:nowrap;margin-top:2px;min-width:52px}
.ht{font-size:12px;font-weight:700;flex:1}
.pr{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9}
.pr:last-child{border-bottom:none}
.pn{font-weight:700;font-size:12px}
.pf{font-size:10px;color:var(--muted)}
.pm{font-weight:900;font-size:14px;color:var(--ok)}
.ec{border-left:3px solid var(--p);padding:9px 11px;background:#f8faff;border-radius:0 10px 10px 0;margin-bottom:7px}
.ef{font-weight:900;font-size:13px}
.chips{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700}
.pb{background:#e0f2fe;border-radius:999px;height:7px;overflow:hidden;margin-top:3px}
.pf2{height:100%;border-radius:999px;transition:width .5s}
.sr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f1f5f9;font-size:12px}
.sr:last-child{border-bottom:none}
.sk{color:var(--muted);font-weight:600}
.sv2{font-weight:800}
.sb{margin-bottom:9px}
.sb input{width:100%;padding:9px 13px;border-radius:11px;border:1.5px solid var(--border);font-size:13px;outline:none;font-family:'Nunito',sans-serif;background:#fff}
.fls{display:flex;gap:5px;margin-bottom:10px;overflow-x:auto;padding-bottom:3px}
.fb{padding:4px 12px;border-radius:999px;border:1.5px solid var(--border);background:#fff;color:#0369a1;font-weight:700;font-size:11px;cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap;flex-shrink:0}
.fb.active{background:var(--p);color:#fff;border-color:var(--p)}
.tabs{display:flex;background:#f0f9ff;border-radius:11px;padding:3px;margin-bottom:11px}
.tab{flex:1;padding:6px;border-radius:9px;border:none;font-weight:700;font-size:11px;cursor:pointer;font-family:'Nunito',sans-serif;background:none;color:var(--muted)}
.tab.active{background:#fff;color:var(--p);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:flex-end}
.md{background:#fff;border-radius:20px 20px 0 0;padding:18px 16px 30px;width:100%;max-height:92vh;overflow-y:auto}
.mt{font-weight:900;font-size:17px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;padding:9px 18px;border-radius:999px;font-weight:700;font-size:12px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:92vw;text-align:center}
.toast.show{opacity:1}
.st{font-weight:900;font-size:14px;margin-bottom:9px;display:flex;align-items:center;gap:6px}
.spinner{width:32px;height:32px;border:3px solid #bae6fd;border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite;margin:18px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:36px 0;color:var(--muted)}
.map-btn{display:flex;align-items:center;justify-content:center;gap:5px;padding:8px 12px;background:#f0f9ff;border-radius:11px;border:1.5px solid var(--border);color:var(--p);font-weight:700;font-size:12px;text-decoration:none;flex:1}
.confirm-box{background:#fff1f2;border:1.5px solid #fca5a5;border-radius:13px;padding:13px;text-align:center;margin-top:10px}
.cb2{display:flex;gap:7px;margin-top:9px}
.zona-tag{display:inline-block;padding:1px 7px;border-radius:999px;font-size:9px;font-weight:700;background:#e0f2fe;color:#0369a1;margin-left:4px}
.hoy-card{background:linear-gradient(135deg,#0e3460,#0ea5e9);color:#fff;border-radius:14px;padding:14px;margin-bottom:10px}
.hoy-title{font-weight:900;font-size:16px;margin-bottom:3px}
.hoy-sub{font-size:11px;opacity:.8;margin-bottom:12px}
.hoy-item{background:rgba(255,255,255,.15);border-radius:10px;padding:9px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.hoy-item.done{opacity:.5}
.hoy-nombre{font-weight:800;font-size:13px}
.hoy-dir{font-size:10px;opacity:.8;margin-top:2px}
.nro{display:inline-block;background:#f0f9ff;color:var(--p);font-weight:900;font-size:10px;padding:1px 7px;border-radius:999px;margin-right:4px}
.qa{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.qa-btn{border-radius:12px;padding:11px 8px;border:none;font-weight:800;font-size:12px;cursor:pointer;font-family:'Nunito',sans-serif;display:flex;flex-direction:column;align-items:center;gap:4px}
.qa-icon{font-size:22px}
.metodo-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.metodo-btn{padding:10px;border-radius:11px;border:2px solid var(--border);background:#fff;font-weight:800;font-size:13px;cursor:pointer;font-family:'Nunito',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px}
.metodo-btn.active{border-color:var(--p);background:#f0f9ff;color:var(--p)}
.metodo-btn.efectivo.active{border-color:var(--ok);background:#f0fdf4;color:var(--ok)}
.metodo-btn.transferencia.active{border-color:var(--p);background:#f0f9ff;color:var(--p)}
.repartidor-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.repartidor-btn{padding:10px;border-radius:11px;border:2px solid var(--border);background:#fff;font-weight:800;font-size:13px;cursor:pointer;font-family:'Nunito',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px}
.repartidor-btn.lorenzo.active{border-color:var(--lorenzo);background:#ede9fe;color:#6d28d9}
.repartidor-btn.renato.active{border-color:var(--renato);background:#ffedd5;color:#c2410c}
.check-icon{width:22px;height:22px;border-radius:50%;border:2px solid #cbd5e1;display:inline-flex;align-items:center;justify-content:center;font-size:14px;background:#fff;color:transparent}
.check-icon.done{background:var(--ok);border-color:var(--ok);color:#fff}
.caja-box{border-radius:14px;padding:12px;color:#fff}
.caja-lorenzo{background:linear-gradient(135deg,#8b5cf6,#7c3aed)}
.caja-renato{background:linear-gradient(135deg,#f97316,#ea580c)}
.caja-num{font-weight:900;font-size:22px}
.caja-lbl{font-size:10px;opacity:.9;font-weight:700}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div id="app"></div>
<div id="modal"></div>
<script>
const REPARTIDORES = [
  {id:'lorenzo', nombre:'Lorenzo', emoji:'👤', color:'#8b5cf6'},
  {id:'renato', nombre:'Renato', emoji:'👤', color:'#f97316'}
];

function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

const S={
  view:'setup', tab:'hoy',
  clients:[], pagos:[], entregas:[], arqueos:[],
  stock:{fcDisponibles:0,fcEnCasas:0,fcReparacion:0,natDisponibles:0,bidonesLlenos:0,bidonesVacios:0,historial:[]},
  selected:null, search:'', filter:'todos', ordenar:'proxima',
  loading:false, syncing:false,
  scriptUrl:localStorage.getItem('aguacontrol_url')||'',
  usuarioActual: localStorage.getItem('aguacontrol_user')||'',
  completadasHoy: JSON.parse(localStorage.getItem('completadasHoy_'+today())||'[]'),
  showConfirmDelete:false, form:emptyForm(), detailTab:'info',
  modal:null, entregaForm:emptyEF(),
};

function emptyForm(){return{nroCliente:'',nombre:'',telefono:'',direccion:'',barrio:'',zona:'',bidones:6,notas:'',precioPorEntrega:40000,fotoUrl:'',dispenserFrioCalor:1,dispenserNatural:0,fechaInicio:today(),estado:'activo'};}
function emptyEF(){return{bidones:6,dispenserFCEntregados:0,dispenserFCRetirados:0,dispenserNatVendidos:0,notas:'',cobrado:false,monto:0,metodoPago:'',repartidor:(typeof S!=='undefined'?S.usuarioActual:'')||'',comprobante:''};}

function addMonths(ds,n){const c=String(ds).substring(0,10).split('-');const d=new Date(+c[0],+c[1]-1+n,+c[2]);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function cleanDate(ds){return ds?String(ds).substring(0,10):'';}
function daysUntil(ds){const c=cleanDate(ds);if(!c)return 999;const p=c.split('-');const f=new Date(+p[0],+p[1]-1,+p[2]);const h=new Date();h.setHours(0,0,0,0);return Math.ceil((f-h)/864e5);}
function fmtDate(ds){const c=cleanDate(ds);if(!c)return'—';const[y,m,d]=c.split('-');return`${d}/${m}/${y}`;}
function fmtDateLong(ds){const c=cleanDate(ds);if(!c)return'—';const p=c.split('-');const d=new Date(+p[0],+p[1]-1,+p[2]);return d.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});}
function fmtMoney(n){return'$'+Number(n||0).toLocaleString('es-AR');}
function fmtDateNow(){const d=new Date();return d.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});}
function repNombre(id){const r=REPARTIDORES.find(x=>x.id===id);return r?r.nombre:(id||'—');}

function badgeD(days){
  if(days<0)return`<span class="badge b-ovd">Vencido ${Math.abs(days)}d</span>`;
  if(days===0)return`<span class="badge b-today">¡Hoy!</span>`;
  if(days<=5)return`<span class="badge b-urg">En ${days}d</span>`;
  if(days<=10)return`<span class="badge b-warn">En ${days}d</span>`;
  return`<span class="badge b-ok">En ${days}d</span>`;
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function stats(){
  const ac=S.clients.filter(c=>c.estado==='activo');
  const v=ac.filter(c=>daysUntil(c.proximaEntrega)<0).length;
  const u=ac.filter(c=>{const d=daysUntil(c.proximaEntrega);return d>=0&&d<=5;}).length;
  return{vencidos:v,urgentes:u,total:ac.length,hoy:ac.filter(c=>daysUntil(c.proximaEntrega)===0).length};
}
function cDeuda(id){return S.pagos.filter(p=>p.clienteId==id&&p.estado==='pendiente').reduce((a,p)=>a+Number(p.monto),0);}
function totalDeuda(){return S.clients.reduce((a,c)=>a+cDeuda(c.id),0);}
function totalCobrado(){return S.pagos.filter(p=>p.estado==='pagado').reduce((a,p)=>a+Number(p.monto),0);}
function entsCli(id){return S.entregas.filter(e=>e.clienteId==id).sort((a,b)=>new Date(cleanDate(b.fecha))-new Date(cleanDate(a.fecha)));}
function nextNro(){return S.clients.length>0?Math.max(...S.clients.map(c=>parseInt(c.nroCliente)||0))+1:1;}

// CAJA del día
function cajaRepartidor(repId, metodo){
  const hoy=today();
  let total=0;
  S.pagos.forEach(p=>{if(p.repartidor===repId&&cleanDate(p.fecha)===hoy&&p.estado==='pagado'&&(!metodo||p.metodoPago===metodo))total+=Number(p.monto);});
  S.entregas.forEach(e=>{if(e.repartidor===repId&&cleanDate(e.fecha)===hoy&&e.cobrado&&(!metodo||e.metodoPago===metodo))total+=Number(e.monto);});
  // Restar arqueos
  S.arqueos.filter(a=>a.repartidor===repId&&cleanDate(a.fecha)===hoy).forEach(a=>{total-=Number(a.efectivoEntregado);});
  return total;
}
function cajaMes(repId){
  const mes=today().slice(0,7);
  return S.pagos.filter(p=>p.repartidor===repId&&cleanDate(p.fecha).startsWith(mes)&&p.estado==='pagado').reduce((a,p)=>a+Number(p.monto),0)
    +S.entregas.filter(e=>e.repartidor===repId&&cleanDate(e.fecha).startsWith(mes)&&e.cobrado).reduce((a,e)=>a+Number(e.monto),0);
}
function entregasHoyRep(repId){
  return S.entregas.filter(e=>e.repartidor===repId&&cleanDate(e.fecha)===today()).length;
}

// JSONP API
function jsonpCall(url){
  return new Promise((resolve,reject)=>{
    const cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*9999);
    const script=document.createElement('script');
    const to=setTimeout(()=>{delete window[cb];if(script.parentNode)document.body.removeChild(script);reject(new Error('Timeout'));},15000);
    window[cb]=(data)=>{clearTimeout(to);delete window[cb];if(script.parentNode)document.body.removeChild(script);resolve(data);};
    script.src=url+'&callback='+cb;
    script.onerror=()=>{clearTimeout(to);if(script.parentNode)document.body.removeChild(script);reject(new Error('Error de red'));};
    document.body.appendChild(script);
  });
}
async function api(action,data){let url=S.scriptUrl+'?action='+action;if(data)url+='&data='+encodeURIComponent(JSON.stringify(data));return jsonpCall(url);}
async function fetchAll(){
  if(!S.scriptUrl)return;S.loading=true;render();
  try{const r=await api('getAll');if(r.success){S.clients=r.clients||[];S.pagos=r.pagos||[];S.stock=r.stock||{fcDisponibles:0,fcEnCasas:0,fcReparacion:0,natDisponibles:0,bidonesLlenos:0,bidonesVacios:0,historial:[]};S.entregas=r.entregas||[];S.arqueos=r.arqueos||[];}else showToast('⚠️ '+r.error);}
  catch(e){showToast('⚠️ '+e.message);}
  S.loading=false;render();
}
async function saveClients(){S.syncing=true;render();try{await api('saveClients',S.clients);}catch(e){showToast('⚠️ '+e.message);}S.syncing=false;render();}
async function savePagoApi(p){try{await api('savePago',p);}catch(e){showToast('⚠️ '+e.message);}}
async function saveStockApi(d){try{await api('saveStock',d);}catch(e){showToast('⚠️ '+e.message);}}
async function saveEntregaApi(e){try{await api('saveEntrega',e);}catch(ex){showToast('⚠️ '+ex.message);}}
async function saveArqueoApi(a){try{await api('saveArqueo',a);}catch(e){showToast('⚠️ '+e.message);}}

// ACCIONES
function setUsuario(id){S.usuarioActual=id;localStorage.setItem('aguacontrol_user',id);render();}

function saveForm(){
  const f=S.form;if(!f.nombre.trim()||!f.direccion.trim()){showToast('⚠️ Completá nombre y dirección');return;}
  const prox=addMonths(f.fechaInicio,1);
  const fc=parseInt(f.dispenserFrioCalor)||0,nat=parseInt(f.dispenserNatural)||0;
  if(S.view==='nuevo'){
    const nro=f.nroCliente||nextNro();
    S.clients.push({id:Date.now(),nroCliente:nro,...f,bidones:parseInt(f.bidones)||6,precioPorEntrega:parseFloat(f.precioPorEntrega)||40000,dispenserFrioCalor:fc,dispenserNatural:nat,proximaEntrega:prox,historial:[{fecha:f.fechaInicio,accion:`Alta #${nro} — ${fc} F/C + ${nat} Nat. + ${f.bidones} bid.`}]});
    const st={...S.stock,fcDisponibles:Math.max(0,(S.stock.fcDisponibles||0)-fc),fcEnCasas:(S.stock.fcEnCasas||0)+fc,natDisponibles:Math.max(0,(S.stock.natDisponibles||0)-nat)};
    S.stock=st;saveStockApi({...st,fecha:today(),nota:`Alta ${f.nombre}`});
  }else{
    const idx=S.clients.findIndex(c=>c.id===S.selected.id);
    if(idx>=0)S.clients[idx]={...S.clients[idx],...f,bidones:parseInt(f.bidones)||6,precioPorEntrega:parseFloat(f.precioPorEntrega)||40000,dispenserFrioCalor:fc,dispenserNatural:nat,proximaEntrega:prox};
  }
  saveClients();S.view='lista';S.tab='clientes';S.form=emptyForm();S.selected=null;render();
}

function abrirModalEntrega(clienteId){

    dispenserNatVendidos: ult?ult.dispenserNatVendidos:0,
    notas:'', cobrado:false, monto:c.precioPorEntrega||0,
    metodoPago:'', repartidor:S.usuarioActual||'',comprobante:''
  };
  S.modal='entrega';render();
}

function confirmarEntrega(){
  const c=S.clients.find(x=>x.id===S.selected?.id)||S.selected;if(!c)return;
  const f=S.entregaForm;
  if(f.cobrado&&!f.metodoPago){showToast('⚠️ Elegí método de pago');return;}
  if(!f.repartidor){showToast('⚠️ Elegí el repartidor');return;}
  const bid=parseInt(f.bidones)||0,fcE=parseInt(f.dispenserFCEntregados)||0,fcR=parseInt(f.dispenserFCRetirados)||0,natV=parseInt(f.dispenserNatVendidos)||0,monto=parseFloat(f.monto)||0;
  const fechaHoy=today();
  const entrega={id:Date.now(),clienteId:c.id,clienteNombre:c.nombre,fecha:fechaHoy,bidones:bid,dispenserFCEntregados:fcE,dispenserFCRetirados:fcR,dispenserNatVendidos:natV,notas:f.notas,cobrado:f.cobrado,monto,metodoPago:f.cobrado?f.metodoPago:'',repartidor:f.repartidor,comprobante:f.comprobante||''};
  S.entregas.push(entrega);saveEntregaApi(entrega);
  let ha=`📦 ${bid} bid.`;
  if(fcE>0)ha+=` | +${fcE} F/C`;if(fcR>0)ha+=` | -${fcR} F/C ret.`;if(natV>0)ha+=` | ${natV} Nat.`;
  if(monto>0)ha+=` | ${f.cobrado?'✅ '+f.metodoPago:'⏳ pendiente'}: ${fmtMoney(monto)}`;
  if(f.repartidor)ha+=` | 👤 ${repNombre(f.repartidor)}`;
  const idx=S.clients.findIndex(x=>x.id===c.id);
  S.clients[idx]={...c,proximaEntrega:addMonths(fechaHoy,1),dispenserFrioCalor:Math.max(0,(c.dispenserFrioCalor||0)+fcE-fcR),historial:[{fecha:fechaHoy,accion:ha},...(c.historial||[])]};
  S.selected=S.clients[idx];
  if(monto>0){const pago={id:Date.now()+1,clienteId:c.id,clienteNombre:c.nombre,fecha:fechaHoy,monto,concepto:`Entrega ${fmtDate(fechaHoy)}`,estado:f.cobrado?'pagado':'pendiente',metodoPago:f.cobrado?f.metodoPago:'',repartidor:f.repartidor,comprobante:f.comprobante||''};S.pagos.push(pago);savePagoApi(pago);}
  const st={...S.stock};st.bidonesLlenos=Math.max(0,(st.bidonesLlenos||0)-bid);st.bidonesVacios=(st.bidonesVacios||0)+bid;st.fcDisponibles=Math.max(0,(st.fcDisponibles||0)-fcE+fcR);st.fcEnCasas=Math.max(0,(st.fcEnCasas||0)+fcE-fcR);st.natDisponibles=Math.max(0,(st.natDisponibles||0)-natV);
  S.stock=st;saveStockApi({...st,fecha:fechaHoy,nota:`Entrega ${c.nombre}`});
  // Marcar como completada en checklist
  if(!S.completadasHoy.includes(c.id)){S.completadasHoy.push(c.id);localStorage.setItem('completadasHoy_'+fechaHoy,JSON.stringify(S.completadasHoy));}
  saveClients();S.modal=null;S.entregaForm=emptyEF();showToast('✅ Entrega registrada');render();
}

function marcarPagado(id, metodo, rep){
  const idx=S.pagos.findIndex(p=>p.id===id);if(idx<0)return;
  if(!metodo){S.modal='cobrarPago';S.selected={pagoId:id};render();return;}
  S.pagos[idx].estado='pagado';S.pagos[idx].metodoPago=metodo;S.pagos[idx].repartidor=rep||S.usuarioActual;
  savePagoApi({updateId:id,metodoPago:metodo,repartidor:rep||S.usuarioActual});
  showToast('✅ Cobro registrado');render();
}

function agregarPago(form){
  if(!form.clienteId||!form.monto){showToast('⚠️ Completá cliente y monto');return;}
  if(form.estado==='pagado'&&!form.metodoPago){showToast('⚠️ Elegí método de pago');return;}
  const c=S.clients.find(x=>x.id==form.clienteId);
  const p={id:Date.now(),clienteId:parseInt(form.clienteId),clienteNombre:c?.nombre||'',fecha:form.fecha||today(),monto:parseFloat(form.monto),concepto:form.concepto||'Entrega mensual',estado:form.estado||'pagado',metodoPago:form.metodoPago||'',repartidor:form.repartidor||S.usuarioActual||''};
  S.pagos.push(p);savePagoApi(p);showToast('✅ Pago agregado');render();
}

function actualizarStock(form){
  const st={fcDisponibles:parseInt(form.fcD)||0,fcEnCasas:S.stock.fcEnCasas||0,fcReparacion:parseInt(form.fcR)||0,natDisponibles:parseInt(form.natD)||0,bidonesLlenos:parseInt(form.bL)||0,bidonesVacios:parseInt(form.bV)||0};
  S.stock={...S.stock,...st};saveStockApi({...st,fecha:today(),nota:form.nota||'Actualización manual'});showToast('✅ Stock actualizado');render();
}

function hacerArqueo(repId, monto, notas){
  if(!monto||monto<=0){showToast('⚠️ Ingresá monto');return;}
  const a={id:Date.now(),fecha:today(),repartidor:repId,efectivoEntregado:parseFloat(monto),notas:notas||''};
  S.arqueos.push(a);saveArqueoApi(a);showToast(`✅ Arqueo de ${repNombre(repId)}: ${fmtMoney(monto)}`);S.modal=null;render();
}

function deleteClient(id){S.clients=S.clients.filter(c=>c.id!==id);S.showConfirmDelete=false;S.view='lista';S.selected=null;saveClients();render();}
function cambiarEstado(id,estado){const idx=S.clients.findIndex(c=>c.id===id);if(idx>=0){S.clients[idx].estado=estado;saveClients();showToast(`✅ ${estado==='activo'?'Activado':'Pausado'}`);render();}}

function generarResumenWA(){
  const hoy=today();
  const entsHoy=S.entregas.filter(e=>cleanDate(e.fecha)===hoy);
  const cobradoEf=entsHoy.filter(e=>e.cobrado&&e.metodoPago==='efectivo').reduce((a,e)=>a+Number(e.monto),0);
  const cobradoTr=entsHoy.filter(e=>e.cobrado&&e.metodoPago==='transferencia').reduce((a,e)=>a+Number(e.monto),0);
  const pendiente=entsHoy.filter(e=>e.monto>0&&!e.cobrado).reduce((a,e)=>a+Number(e.monto),0);
  let msg=`💧 *AguaControl — Resumen ${fmtDate(hoy)}*\n\n`;
  msg+=`📦 Entregas realizadas: ${entsHoy.length}\n`;
  msg+=`🫙 Bidones entregados: ${entsHoy.reduce((a,e)=>a+Number(e.bidones),0)}\n\n`;
  msg+=`💰 *COBROS DEL DÍA*\n`;
  msg+=`💵 Efectivo: ${fmtMoney(cobradoEf)}\n`;
  msg+=`🏦 Transferencia: ${fmtMoney(cobradoTr)}\n`;
  if(pendiente>0)msg+=`⏳ Pendiente: ${fmtMoney(pendiente)}\n`;
  msg+=`\n👥 *POR REPARTIDOR*\n`;
  REPARTIDORES.forEach(r=>{
    const ents=entsHoy.filter(e=>e.repartidor===r.id);
    if(ents.length>0){
      msg+=`${r.nombre}: ${ents.length} entregas · ${fmtMoney(cajaRepartidor(r.id))}\n`;
    }
  });
  return msg;
}

function filteredClients(){
  let list=[...S.clients];
  if(S.filter!=='todos'&&S.filter!=='pausados')list=list.filter(c=>c.estado==='activo');
  if(S.filter==='pausados')list=list.filter(c=>c.estado==='pausado');
  if(S.search.trim()){const q=S.search.toLowerCase();list=list.filter(c=>c.nombre.toLowerCase().includes(q)||c.direccion.toLowerCase().includes(q)||(c.barrio||'').toLowerCase().includes(q)||(c.zona||'').toLowerCase().includes(q)||String(c.nroCliente).includes(q));}
  if(S.filter==='urg')list=list.filter(c=>{const d=daysUntil(c.proximaEntrega);return d>=0&&d<=5;});
  if(S.filter==='ovd')list=list.filter(c=>daysUntil(c.proximaEntrega)<0);
  if(S.filter==='deuda')list=list.filter(c=>cDeuda(c.id)>0);
  if(S.ordenar==='proxima')list.sort((a,b)=>new Date(cleanDate(a.proximaEntrega))-new Date(cleanDate(b.proximaEntrega)));
  if(S.ordenar==='nombre')list.sort((a,b)=>a.nombre.localeCompare(b.nombre));
  if(S.ordenar==='nro')list.sort((a,b)=>(parseInt(a.nroCliente)||0)-(parseInt(b.nroCliente)||0));
  if(S.ordenar==='barrio')list.sort((a,b)=>(a.barrio||'').localeCompare(b.barrio||''));
  if(S.ordenar==='zona')list.sort((a,b)=>(a.zona||'').localeCompare(b.zona||''));
  return list;
}

function buildPagos(){
  const pend=S.pagos.filter(p=>p.estado==='pendiente').sort((a,b)=>new Date(cleanDate(a.fecha))-new Date(cleanDate(b.fecha)));
  const rec=S.pagos.filter(p=>p.estado==='pagado').sort((a,b)=>new Date(cleanDate(b.fecha))-new Date(cleanDate(a.fecha))).slice(0,15);
  const mes=today().slice(0,7);
  const efMes=S.pagos.filter(p=>p.estado==='pagado'&&p.metodoPago==='efectivo'&&cleanDate(p.fecha).startsWith(mes)).reduce((a,p)=>a+Number(p.monto),0);
  const trMes=S.pagos.filter(p=>p.estado==='pagado'&&p.metodoPago==='transferencia'&&cleanDate(p.fecha).startsWith(mes)).reduce((a,p)=>a+Number(p.monto),0);
  return`<div class="st">💰 Pagos</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
    <div class="card" style="text-align:center;border-color:#86efac;background:#f0fdf4"><div style="font-size:9px;color:var(--muted);font-weight:700">💵 EFECTIVO (mes)</div><div style="font-weight:900;font-size:15px;color:var(--ok)">${fmtMoney(efMes)}</div></div>
    <div class="card" style="text-align:center;border-color:#93c5fd;background:#eff6ff"><div style="font-size:9px;color:var(--muted);font-weight:700">🏦 TRANSFER. (mes)</div><div style="font-weight:900;font-size:15px;color:var(--p)">${fmtMoney(trMes)}</div></div>
  </div>
  ${pend.length>0?`<div class="card">
    <div class="st">🔴 Pendientes (${pend.length})</div>
    ${pend.map(p=>`<div class="pr">
      <div><div class="pn">${p.clienteNombre}</div><div class="pf">${p.concepto} — ${fmtDate(p.fecha)}</div></div>
      <div style="display:flex;align-items:center;gap:6px"><div class="pm">${fmtMoney(p.monto)}</div><button class="btn bs btn-sm" data-pagoid="${p.id}">✓</button></div>
    </div>`).join('')}
  </div>`:''}
  <div class="card">
    <div class="st">✅ Últimos cobros</div>
    ${rec.length===0?'<div style="color:var(--muted);font-size:12px">Sin cobros</div>':
      rec.map(p=>`<div class="pr"><div><div class="pn">${p.clienteNombre}</div><div class="pf">${p.concepto} — ${fmtDate(p.fecha)}${p.metodoPago?' · '+(p.metodoPago==='efectivo'?'💵':'🏦'):''}${p.repartidor?' · '+repNombre(p.repartidor):''}</div></div><div class="pm">${fmtMoney(p.monto)}</div></div>`).join('')}
  </div>
  <div class="card">
    <div class="st">➕ Registrar cobro</div>
    <div class="fg"><label class="fl">Cliente</label><select class="fi" id="gPC"><option value="">Seleccioná...</option>${S.clients.filter(c=>c.estado==='activo').sort((a,b)=>a.nombre.localeCompare(b.nombre)).map(c=>`<option value="${c.id}">#${c.nroCliente} ${c.nombre}</option>`).join('')}</select></div>
    <div class="fr">
      <div class="fg"><label class="fl">Monto</label><input class="fi" id="gPM" type="number" placeholder="0"></div>
      <div class="fg"><label class="fl">Estado</label><select class="fi" id="gPE"><option value="pagado">Pagado</option><option value="pendiente">Pendiente</option></select></div>
    </div>
    <div class="fg" id="gMetodoBox"><label class="fl">💳 Método</label>
      <div class="metodo-btns">
        <button type="button" class="metodo-btn efectivo" data-gmet="efectivo">💵 Efectivo</button>
        <button type="button" class="metodo-btn transferencia" data-gmet="transferencia">🏦 Transferencia</button>
      </div>
      <input type="hidden" id="gPMet" value="">
    </div>
    <div class="fg"><label class="fl">Concepto</label><input class="fi" id="gPCon" type="text" value="Entrega mensual"></div>
    <button class="btn bp btn-blk" id="gAddPago">💰 Registrar</button>
  </div>`;
}

function buildStock(){
  const st=S.stock;
  const fcEnCasas=S.clients.filter(c=>c.estado==='activo').reduce((a,c)=>a+(c.dispenserFrioCalor||0),0);
  const totalFC=(st.fcDisponibles||0)+fcEnCasas+(st.fcReparacion||0);
  const totalBid=(st.bidonesLlenos||0)+(st.bidonesVacios||0);
  const pctFC=totalFC>0?Math.round(((st.fcDisponibles||0)/totalFC)*100):0;
  const pctBid=totalBid>0?Math.round(((st.bidonesLlenos||0)/totalBid)*100):0;
  return`<div class="st">📦 Stock</div>
  <div class="card" style="margin-bottom:9px">
    <div style="font-weight:800;font-size:13px;margin-bottom:8px">❄️🔥 Dispensers Frío/Calor</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:7px">
      ${[{l:'Disponibles',v:st.fcDisponibles||0,c:'#22c55e',bg:'#dcfce7'},{l:'En casas',v:fcEnCasas,c:'#3b82f6',bg:'#dbeafe'},{l:'Reparación',v:st.fcReparacion||0,c:'#f59e0b',bg:'#fef3c7'}]
        .map(x=>`<div style="background:${x.bg};border-radius:9px;padding:7px;text-align:center"><div style="font-weight:900;font-size:20px;color:${x.c}">${x.v}</div><div style="font-size:8px;font-weight:700;color:var(--muted)">${x.l}</div></div>`).join('')}
    </div>
    <div class="pb"><div class="pf2" style="width:${pctFC}%;background:linear-gradient(90deg,#22c55e,#16a34a)"></div></div>
    <div style="font-size:10px;color:var(--muted);margin-top:3px">Total: ${totalFC} | ${pctFC}% disponibles</div>
  </div>
  <div class="card" style="margin-bottom:9px">
    <div style="font-weight:800;font-size:13px;margin-bottom:6px">💧 Dispensers Natural</div>
    <div style="text-align:center"><div style="font-weight:900;font-size:38px;color:#0ea5e9">${st.natDisponibles||0}</div>
    <div style="font-size:12px;color:var(--muted);font-weight:600">disponibles para vender</div></div>
  </div>
  <div class="card" style="margin-bottom:9px">
    <div style="font-weight:800;font-size:13px;margin-bottom:7px">🫙 Bidones</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:6px">
      <div style="background:#dcfce7;border-radius:9px;padding:9px;text-align:center"><div style="font-weight:900;font-size:26px;color:#15803d">${st.bidonesLlenos||0}</div><div style="font-size:9px;font-weight:700;color:var(--muted)">🫙 LLENOS</div></div>
      <div style="background:#fee2e2;border-radius:9px;padding:9px;text-align:center"><div style="font-weight:900;font-size:26px;color:#dc2626">${st.bidonesVacios||0}</div><div style="font-size:9px;font-weight:700;color:var(--muted)">🪣 VACÍOS</div></div>
    </div>
    <div class="pb"><div class="pf2" style="width:${pctBid}%;background:linear-gradient(90deg,#22c55e,#16a34a)"></div></div>
    <div style="font-size:10px;color:var(--muted);margin-top:3px">${pctBid}% llenos</div>
  </div>
  <div class="card">
    <div class="st">📝 Actualizar stock</div>
    <div style="background:#f0f9ff;border-radius:9px;padding:9px;margin-bottom:9px">
      <div style="font-size:11px;font-weight:700;color:var(--p);margin-bottom:7px">❄️🔥 Dispensers F/C</div>
      <div class="fr">
        <div class="fg"><label class="fl">Disponibles</label><input class="fi" id="sFCd" type="number" min="0" value="${st.fcDisponibles||0}"></div>
        <div class="fg"><label class="fl">En reparación</label><input class="fi" id="sFCr" type="number" min="0" value="${st.fcReparacion||0}"></div>
      </div>
    </div>
    <div class="fg"><label class="fl">💧 Dispensers Natural</label><input class="fi" id="sNat" type="number" min="0" value="${st.natDisponibles||0}"></div>
    <div class="fr">
      <div class="fg"><label class="fl">🫙 Bidones llenos</label><input class="fi" id="sBL" type="number" min="0" value="${st.bidonesLlenos||0}"></div>
      <div class="fg"><label class="fl">🪣 Bidones vacíos</label><input class="fi" id="sBV" type="number" min="0" value="${st.bidonesVacios||0}"></div>
    </div>
    <div class="fg"><label class="fl">Nota</label><input class="fi" id="sNota" type="text" placeholder="Ej: Recibí 50 llenos..."></div>
    <button class="btn bp btn-blk" id="saveStockBtn">📦 Guardar stock</button>
  </div>`;
}

function buildReporte(){
  const mes=today().slice(0,7);
  const eM=S.entregas.filter(e=>cleanDate(e.fecha).startsWith(mes));
  const bidM=eM.reduce((a,e)=>a+Number(e.bidones),0);
  const fcM=eM.reduce((a,e)=>a+Number(e.dispenserFCEntregados||0),0);
  const natM=eM.reduce((a,e)=>a+Number(e.dispenserNatVendidos||0),0);
  const ingM=S.pagos.filter(p=>p.estado==='pagado'&&cleanDate(p.fecha).startsWith(mes)).reduce((a,p)=>a+Number(p.monto),0);
  const efM=S.pagos.filter(p=>p.estado==='pagado'&&p.metodoPago==='efectivo'&&cleanDate(p.fecha).startsWith(mes)).reduce((a,p)=>a+Number(p.monto),0);
  const trM=S.pagos.filter(p=>p.estado==='pagado'&&p.metodoPago==='transferencia'&&cleanDate(p.fecha).startsWith(mes)).reduce((a,p)=>a+Number(p.monto),0);
  const conDeuda=S.clients.filter(c=>cDeuda(c.id)>0);
  const mesN=new Date().toLocaleString('es-AR',{month:'long',year:'numeric'});
  // Ranking repartidores
  const ranking=REPARTIDORES.map(r=>{
    const ents=S.entregas.filter(e=>e.repartidor===r.id&&cleanDate(e.fecha).startsWith(mes));
    const cobrado=cajaMes(r.id);
    return{...r,entregas:ents.length,cobrado,bidones:ents.reduce((a,e)=>a+Number(e.bidones),0)};
  }).sort((a,b)=>b.cobrado-a.cobrado);

  return`<div class="st">📊 Reporte del mes</div>
  <div class="card">
    <div class="st" style="font-size:12px;text-transform:capitalize">📅 ${mesN}</div>
    ${[['🚚 Entregas',eM.length],['🫙 Bidones entregados',bidM],['❄️🔥 Disp. F/C entregados',fcM],['💧 Disp. Natural vendidos',natM],['💰 Cobrado total',fmtMoney(ingM)],['💵 Efectivo',fmtMoney(efM)],['🏦 Transferencia',fmtMoney(trM)],['🔴 Clientes con deuda',conDeuda.length],['💸 Deuda total',fmtMoney(totalDeuda())],['👥 Clientes activos',S.clients.filter(c=>c.estado==='activo').length]]
      .map(([k,v])=>`<div class="sr"><span class="sk">${k}</span><span class="sv2">${v}</span></div>`).join('')}
  </div>

  <div class="card">
    <div class="st">🏆 Ranking de repartidores</div>
    ${ranking.map((r,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f1f5f9">
      <div style="font-size:18px">${i===0?'🥇':i===1?'🥈':'🥉'}</div>
      <div style="flex:1">
        <div style="font-weight:800;font-size:13px">${r.emoji} ${r.nombre}</div>
        <div style="font-size:10px;color:var(--muted)">${r.entregas} entregas · ${r.bidones} bidones</div>
      </div>
      <div style="font-weight:900;font-size:14px;color:var(--ok)">${fmtMoney(r.cobrado)}</div>
    </div>`).join('')}
  </div>

  ${conDeuda.length>0?`<div class="card">
    <div class="st">💰 Clientes con deuda</div>
    ${conDeuda.map(c=>`<div class="sr"><span class="sk"><span class="nro">#${c.nroCliente}</span>${c.nombre}</span><span class="sv2" style="color:var(--danger)">${fmtMoney(cDeuda(c.id))}</span></div>`).join('')}
  </div>`:''}`;
}

// BIND EVENTS
function bindEvents(){
  // Select user inicial
  document.querySelectorAll('[data-selectuser]').forEach(b=>{b.onclick=()=>setUsuario(b.dataset.selectuser);});
  // User switch
  document.querySelectorAll('[data-user]').forEach(b=>{b.onclick=()=>setUsuario(b.dataset.user);});
  // Tabs
  document.querySelectorAll('[data-tab]').forEach(b=>{b.onclick=()=>{S.tab=b.dataset.tab;if(S.tab!=='clientes')S.view='lista';render();};});
  const conn=document.getElementById('connectBtn');
  if(conn)conn.onclick=()=>{const url=document.getElementById('urlInput').value.trim();if(!url){showToast('⚠️ Ingresá la URL');return;}S.scriptUrl=url;localStorage.setItem('aguacontrol_url',url);S.view='lista';fetchAll();};
  const skip=document.getElementById('skipBtn');if(skip)skip.onclick=()=>{S.view='lista';fetchAll();};
  const fab=document.getElementById('fabBtn');if(fab)fab.onclick=()=>{S.form=emptyForm();S.view='nuevo';render();};
  const qaNC=document.getElementById('qaNewClient');if(qaNC)qaNC.onclick=()=>{S.tab='clientes';S.form=emptyForm();S.view='nuevo';render();};
  const qaR=document.getElementById('qaResumen');if(qaR)qaR.onclick=()=>{
    const msg=generarResumenWA();
    const url='https://wa.me/?text='+encodeURIComponent(msg);
    window.open(url,'_blank');
  };
  // Arqueo botones
  document.querySelectorAll('[data-arqueo]').forEach(b=>{b.onclick=e=>{e.stopPropagation();S.modal='arqueo';S.selected={repartidor:b.dataset.arqueo};render();};});
  // Search & filter
  const srch=document.getElementById('srch');if(srch)srch.oninput=e=>{S.search=e.target.value;render();};
  document.querySelectorAll('[data-filter]').forEach(b=>{b.onclick=()=>{S.filter=b.dataset.filter;render();};});
  const rb=document.getElementById('refreshBtn');if(rb)rb.onclick=fetchAll;
  const ord=document.getElementById('ordenSelect');if(ord)ord.onchange=e=>{S.ordenar=e.target.value;render();};
  // Client cards
  document.querySelectorAll('[data-action="open"]').forEach(card=>{
    card.onclick=e=>{if(e.target.closest('[data-action="entregar"]'))return;
      S.selected=S.clients.find(c=>c.id===parseInt(card.dataset.id));
      S.showConfirmDelete=false;S.detailTab='info';S.view='detalle';render();};
  });
  document.querySelectorAll('[data-cid]').forEach(b=>{
    if(b.dataset.action==='entregar'||!b.dataset.arqueo){
      b.onclick=e=>{e.stopPropagation();const id=parseInt(b.dataset.cid);abrirModalEntrega(id);};
    }
  });
  // Form fields
  document.querySelectorAll('[data-field]').forEach(inp=>{
    inp.oninput=e=>{const k=inp.dataset.field;
      if(['bidones','dispenserFrioCalor','dispenserNatural','nroCliente'].includes(k))S.form[k]=parseInt(e.target.value)||0;
      else if(k==='precioPorEntrega')S.form[k]=parseFloat(e.target.value)||0;
      else S.form[k]=e.target.value;};
    inp.onchange=e=>{const k=inp.dataset.field;S.form[k]=e.target.value;};
  });
  const saveBtn=document.getElementById('saveBtn');if(saveBtn)saveBtn.onclick=saveForm;
  const backBtn=document.getElementById('backBtn');if(backBtn)backBtn.onclick=()=>{S.view='lista';S.selected=null;S.form=emptyForm();render();};
  const editBtn=document.getElementById('editBtn');
  if(editBtn)editBtn.onclick=()=>{const c=S.selected;S.form={nroCliente:c.nroCliente,nombre:c.nombre,telefono:c.telefono||'',direccion:c.direccion,barrio:c.barrio||'',zona:c.zona||'',fechaInicio:addMonths(c.proximaEntrega,-1),bidones:c.bidones,notas:c.notas||'',precioPorEntrega:c.precioPorEntrega||40000,fotoUrl:c.fotoUrl||'',dispenserFrioCalor:c.dispenserFrioCalor||0,dispenserNatural:c.dispenserNatural||0,estado:c.estado||'activo'};S.view='editar';render();};
  document.querySelectorAll('[data-dtab]').forEach(b=>{b.onclick=()=>{S.detailTab=b.dataset.dtab;render();};});
  const entBtn=document.getElementById('entBtn');if(entBtn)entBtn.onclick=()=>abrirModalEntrega(S.selected.id);
  const entBtn2=document.getElementById('entBtn2');if(entBtn2)entBtn2.onclick=()=>abrirModalEntrega(S.selected.id);
  // Pagos - marcar pagado abre modal
  document.querySelectorAll('[data-pagoid]').forEach(b=>{b.onclick=()=>marcarPagado(parseInt(b.dataset.pagoid));});
  // Pagos global
  document.querySelectorAll('[data-gmet]').forEach(b=>{b.onclick=()=>{document.querySelectorAll('[data-gmet]').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById('gPMet').value=b.dataset.gmet;};});
  const gAddPago=document.getElementById('gAddPago');
  if(gAddPago)gAddPago.onclick=()=>agregarPago({clienteId:document.getElementById('gPC').value,monto:document.getElementById('gPM').value,estado:document.getElementById('gPE').value,concepto:document.getElementById('gPCon').value,metodoPago:document.getElementById('gPMet').value,repartidor:S.usuarioActual});
  // Stock
  const sStock=document.getElementById('saveStockBtn');
  if(sStock)sStock.onclick=()=>actualizarStock({fcD:document.getElementById('sFCd').value,fcR:document.getElementById('sFCr').value,natD:document.getElementById('sNat').value,bL:document.getElementById('sBL').value,bV:document.getElementById('sBV').value,nota:document.getElementById('sNota').value});
  // Estado cliente
  const pausarBtn=document.getElementById('pausarBtn');if(pausarBtn)pausarBtn.onclick=()=>cambiarEstado(S.selected.id,'pausado');
  const activarBtn=document.getElementById('activarBtn');if(activarBtn)activarBtn.onclick=()=>cambiarEstado(S.selected.id,'activo');
  // Delete
  const delBtn=document.getElementById('deleteBtn');if(delBtn)delBtn.onclick=()=>{S.showConfirmDelete=true;render();};
  const cancelDel=document.getElementById('cancelDel');if(cancelDel)cancelDel.onclick=()=>{S.showConfirmDelete=false;render();};
  const confirmDel=document.getElementById('confirmDel');if(confirmDel)confirmDel.onclick=()=>deleteClient(S.selected.id);
  // Modal entrega
  const mClose=document.getElementById('mClose');if(mClose)mClose.onclick=()=>{S.modal=null;render();};
  const mClose2=document.getElementById('mClose2');if(mClose2)mClose2.onclick=()=>{S.modal=null;render();};
  const mOv=document.getElementById('mOv');if(mOv)mOv.onclick=e=>{if(e.target===mOv){S.modal=null;render();}};
  // Método pago en modal entrega
  document.querySelectorAll('[data-metodo]').forEach(b=>{b.onclick=()=>{document.querySelectorAll('[data-metodo]').forEach(x=>x.classList.remove('active'));b.classList.add('active');S.entregaForm.metodoPago=b.dataset.metodo;};});
  // Repartidor en modal entrega
  document.querySelectorAll('[data-rep]').forEach(b=>{b.onclick=()=>{document.querySelectorAll('[data-rep]').forEach(x=>x.classList.remove('active'));b.classList.add('active');S.entregaForm.repartidor=b.dataset.rep;};});
  // Estado cobrado cambia visibilidad método
  const efCob=document.getElementById('efCob');
  if(efCob)efCob.onchange=e=>{document.getElementById('metodoPagoBox').style.display=e.target.value==='true'?'block':'none';S.entregaForm.cobrado=e.target.value==='true';};
  // Confirmar entrega
  const cfBtn=document.getElementById('cfBtn');
  if(cfBtn)cfBtn.onclick=()=>{
    S.entregaForm.bidones=document.getElementById('efB').value;
    S.entregaForm.dispenserFCEntregados=document.getElementById('efFCE').value;
    S.entregaForm.dispenserFCRetirados=document.getElementById('efFCR').value;
    S.entregaForm.dispenserNatVendidos=document.getElementById('efNat').value;
    S.entregaForm.monto=document.getElementById('efM').value;
    S.entregaForm.cobrado=document.getElementById('efCob').value==='true';
    S.entregaForm.notas=document.getElementById('efN').value;
    S.entregaForm.comprobante=document.getElementById('efComp').value;
    confirmarEntrega();
  };
  // Modal cobrar pago
  let cobrarMet='',cobrarRep=S.usuarioActual;
  document.querySelectorAll('[data-cmet]').forEach(b=>{b.onclick=()=>{document.querySelectorAll('[data-cmet]').forEach(x=>x.classList.remove('active'));b.classList.add('active');cobrarMet=b.dataset.cmet;};});
  document.querySelectorAll('[data-crep]').forEach(b=>{b.onclick=()=>{document.querySelectorAll('[data-crep]').forEach(x=>x.classList.remove('active'));b.classList.add('active');cobrarRep=b.dataset.crep;};});
  const cConfirm=document.getElementById('cConfirmBtn');
  if(cConfirm)cConfirm.onclick=()=>{if(!cobrarMet){showToast('⚠️ Elegí método');return;}if(!cobrarRep){showToast('⚠️ Elegí repartidor');return;}marcarPagado(S.selected.pagoId,cobrarMet,cobrarRep);S.modal=null;render();};
  // Arqueo
  const arqConfirm=document.getElementById('arqConfirmBtn');
  if(arqConfirm)arqConfirm.onclick=()=>hacerArqueo(S.selected.repartidor,document.getElementById('arqMonto').value,document.getElementById('arqNotas').value);
}

if(S.scriptUrl){S.view='lista';render();fetchAll();}else render();

</script>
</body>
</html>
