<body>
<div class="toast" id="toast"></div>
<div id="app"></div>
<div id="modal"></div>
<script>
var REPARTIDORES = [
  {id:'lorenzo', nombre:'Lorenzo', color:'#8b5cf6'},
  {id:'renato', nombre:'Renato', color:'#f97316'}
];

function today(){
  var d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

var S = {
  view: 'setup', tab: 'hoy',
  clients: [], pagos: [], entregas: [], arqueos: [],
  stock: {fcDisponibles:0,fcEnCasas:0,fcReparacion:0,natDisponibles:0,bidonesLlenos:0,bidonesVacios:0,historial:[]},
  selected: null, search: '', filter: 'todos', ordenar: 'proxima',
  loading: false, syncing: false,
  scriptUrl: localStorage.getItem('aguacontrol_url') || '',
  usuarioActual: localStorage.getItem('aguacontrol_user') || '',
  showConfirmDelete: false,
  form: null, entregaForm: null,
  detailTab: 'info', modal: null,
  cobrarMet: '', cobrarRep: ''
};

function emptyForm(){
  return {nroCliente:'',nombre:'',telefono:'',direccion:'',barrio:'',zona:'',bidones:6,notas:'',precioPorEntrega:40000,fotoUrl:'',dispenserFrioCalor:1,dispenserNatural:0,fechaInicio:today(),estado:'activo'};
}
function emptyEF(){
  return {bidones:6,dispenserFCEntregados:0,dispenserFCRetirados:0,dispenserNatVendidos:0,notas:'',cobrado:false,monto:0,metodoPago:'',repartidor:S.usuarioActual||'',comprobante:''};
}

S.form = emptyForm();
S.entregaForm = emptyEF();

function addMonths(ds,n){
  var c = String(ds).substring(0,10).split('-');
  var d = new Date(+c[0],+c[1]-1+n,+c[2]);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function cleanDate(ds){return ds?String(ds).substring(0,10):'';}
function daysUntil(ds){
  var c = cleanDate(ds); if(!c) return 999;
  var p = c.split('-');
  var f = new Date(+p[0],+p[1]-1,+p[2]);
  var h = new Date(); h.setHours(0,0,0,0);
  return Math.ceil((f-h)/864e5);
}
function fmtDate(ds){
  var c = cleanDate(ds); if(!c) return '—';
  var p = c.split('-');
  return p[2]+'/'+p[1]+'/'+p[0];
}
function fmtDateLong(ds){
  var c = cleanDate(ds); if(!c) return '—';
  var p = c.split('-');
  var d = new Date(+p[0],+p[1]-1,+p[2]);
  return d.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
}
function fmtMoney(n){return '$' + Number(n||0).toLocaleString('es-AR');}
function fmtToday(){
  return new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
}
function repNombre(id){
  for(var i=0;i<REPARTIDORES.length;i++) if(REPARTIDORES[i].id===id) return REPARTIDORES[i].nombre;
  return id || '—';
}

function badgeD(d){
  if(d<0) return '<span class="bdg b-o">Vencido '+Math.abs(d)+'d</span>';
  if(d===0) return '<span class="bdg b-t">¡Hoy!</span>';
  if(d<=5) return '<span class="bdg b-u">En '+d+'d</span>';
  if(d<=10) return '<span class="bdg b-w">En '+d+'d</span>';
  return '<span class="bdg b-ok">En '+d+'d</span>';
}
function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  setTimeout(function(){t.classList.remove('on');}, 2800);
}
function stats(){
  var ac = S.clients.filter(function(c){return c.estado==='activo';});
  var v = ac.filter(function(c){return daysUntil(c.proximaEntrega)<0;}).length;
  var u = ac.filter(function(c){var d=daysUntil(c.proximaEntrega);return d>=0&&d<=5;}).length;
  var h = ac.filter(function(c){return daysUntil(c.proximaEntrega)===0;}).length;
  return {vencidos:v,urgentes:u,total:ac.length,hoy:h};
}
function cDeuda(id){
  return S.pagos.filter(function(p){return p.clienteId==id&&p.estado==='pendiente';}).reduce(function(a,p){return a+Number(p.monto);},0);
}
function totalDeuda(){
  return S.clients.reduce(function(a,c){return a+cDeuda(c.id);},0);
}
function totalCobrado(){
  return S.pagos.filter(function(p){return p.estado==='pagado';}).reduce(function(a,p){return a+Number(p.monto);},0);
}
function entsCli(id){
  return S.entregas.filter(function(e){return e.clienteId==id;}).sort(function(a,b){return new Date(cleanDate(b.fecha))-new Date(cleanDate(a.fecha));});
}
function nextNro(){
  if(S.clients.length===0) return 1;
  var max=0;
  for(var i=0;i<S.clients.length;i++){
    var n=parseInt(S.clients[i].nroCliente)||0;
    if(n>max) max=n;
  }
  return max+1;
}
function cajaRepartidor(repId){
  var hoy = today(); var total = 0;
  S.pagos.forEach(function(p){if(p.repartidor===repId&&cleanDate(p.fecha)===hoy&&p.estado==='pagado')total+=Number(p.monto);});
  S.entregas.forEach(function(e){if(e.repartidor===repId&&cleanDate(e.fecha)===hoy&&e.cobrado)total+=Number(e.monto);});
  S.arqueos.filter(function(a){return a.repartidor===repId&&cleanDate(a.fecha)===hoy;}).forEach(function(a){total-=Number(a.efectivoEntregado);});
  return total;
}
function entregasHoyRep(repId){
  return S.entregas.filter(function(e){return e.repartidor===repId&&cleanDate(e.fecha)===today();}).length;
}

// API JSONP
function jsonpCall(url){
  return new Promise(function(resolve, reject){
    var cb = 'cb_'+Date.now()+'_'+Math.floor(Math.random()*9999);
    var script = document.createElement('script');
    var to = setTimeout(function(){
      delete window[cb];
      if(script.parentNode) document.body.removeChild(script);
      reject(new Error('Timeout'));
    }, 15000);
    window[cb] = function(data){
      clearTimeout(to); delete window[cb];
      if(script.parentNode) document.body.removeChild(script);
      resolve(data);
    };
    script.src = url + '&callback=' + cb;
    script.onerror = function(){
      clearTimeout(to);
      if(script.parentNode) document.body.removeChild(script);
      reject(new Error('Error de red'));
    };
    document.body.appendChild(script);
  });
}
function api(action, data){
  var url = S.scriptUrl + '?action=' + action;
  if(data) url += '&data=' + encodeURIComponent(JSON.stringify(data));
  return jsonpCall(url);
}
function fetchAll(){
  if(!S.scriptUrl) return;
  S.loading = true; render();
  api('getAll').then(function(r){
    if(r.success){
      S.clients = r.clients || [];
      S.pagos = r.pagos || [];
      S.stock = r.stock || {fcDisponibles:0,fcEnCasas:0,fcReparacion:0,natDisponibles:0,bidonesLlenos:0,bidonesVacios:0,historial:[]};
      S.entregas = r.entregas || [];
      S.arqueos = r.arqueos || [];
    } else showToast('⚠️ ' + (r.error||'Error'));
    S.loading = false; render();
  }).catch(function(e){
    showToast('⚠️ ' + e.message);
    S.loading = false; render();
  });
}
function saveClients(){
  S.syncing = true; render();
  api('saveClients', S.clients).then(function(){S.syncing=false;render();}).catch(function(e){showToast('⚠️ '+e.message);S.syncing=false;render();});
}
function savePagoApi(p){api('savePago', p).catch(function(e){showToast('⚠️ '+e.message);});}
function saveStockApi(d){api('saveStock', d).catch(function(e){showToast('⚠️ '+e.message);});}
function saveEntregaApi(e){api('saveEntrega', e).catch(function(ex){showToast('⚠️ '+ex.message);});}
function saveArqueoApi(a){api('saveArqueo', a).catch(function(e){showToast('⚠️ '+e.message);});}

// ACCIONES
function setUsuario(id){S.usuarioActual = id; localStorage.setItem('aguacontrol_user', id); render();}

function saveForm(){
  var f = S.form;
  if(!f.nombre.trim() || !f.direccion.trim()){showToast('⚠️ Completá nombre y dirección'); return;}
  var prox = addMonths(f.fechaInicio, 1);
  var fc = parseInt(f.dispenserFrioCalor) || 0;
  var nat = parseInt(f.dispenserNatural) || 0;
  if(S.view === 'nuevo'){
    var nro = f.nroCliente || nextNro();
    var nuevo = {
      id: Date.now(), nroCliente: nro, nombre: f.nombre, telefono: f.telefono,
      direccion: f.direccion, barrio: f.barrio, zona: f.zona, bidones: parseInt(f.bidones)||6,
      fechaInicio: f.fechaInicio, proximaEntrega: prox, notas: f.notas,
      precioPorEntrega: parseFloat(f.precioPorEntrega)||40000, fotoUrl: f.fotoUrl,
      dispenserFrioCalor: fc, dispenserNatural: nat, estado: f.estado,
      historial: [{fecha: f.fechaInicio, accion: 'Alta #'+nro+' — '+fc+' F/C + '+nat+' Nat. + '+f.bidones+' bid.'}]
    };
    S.clients.push(nuevo);
  } else {
    for(var i=0;i<S.clients.length;i++){
      if(S.clients[i].id === S.selected.id){
        var c = S.clients[i];
        c.nombre = f.nombre; c.telefono = f.telefono; c.direccion = f.direccion;
        c.barrio = f.barrio; c.zona = f.zona; c.bidones = parseInt(f.bidones)||6;
        c.notas = f.notas; c.precioPorEntrega = parseFloat(f.precioPorEntrega)||40000;
        c.fotoUrl = f.fotoUrl; c.dispenserFrioCalor = fc; c.dispenserNatural = nat;
        c.estado = f.estado; c.proximaEntrega = prox;
        if(f.nroCliente) c.nroCliente = f.nroCliente;
        break;
      }
    }
  }
  saveClients();
  S.view = 'lista'; S.tab = 'clientes'; S.form = emptyForm(); S.selected = null;
  render();
}

function confirmarEntrega(){
  var c = S.selected; if(!c) return;
  var f = S.entregaForm;
  if(f.cobrado && !f.metodoPago){showToast('⚠️ Elegí método de pago'); return;}
  if(!f.repartidor){showToast('⚠️ Elegí repartidor'); return;}
  var bid = parseInt(f.bidones)||0;
  var fcE = parseInt(f.dispenserFCEntregados)||0;
  var fcR = parseInt(f.dispenserFCRetirados)||0;
  var natV = parseInt(f.dispenserNatVendidos)||0;
  var monto = parseFloat(f.monto)||0;
  var fechaHoy = today();

  var entrega = {
    id: Date.now(), clienteId: c.id, clienteNombre: c.nombre, fecha: fechaHoy,
    bidones: bid, dispenserFCEntregados: fcE, dispenserFCRetirados: fcR,
    dispenserNatVendidos: natV, notas: f.notas, cobrado: f.cobrado, monto: monto,
    metodoPago: f.cobrado ? f.metodoPago : '', repartidor: f.repartidor,
    comprobante: f.comprobante||''
  };
  S.entregas.push(entrega);
  saveEntregaApi(entrega);

  var ha = '📦 '+bid+' bid.';
  if(fcE>0) ha += ' | +'+fcE+' F/C';
  if(fcR>0) ha += ' | -'+fcR+' F/C ret.';
  if(natV>0) ha += ' | '+natV+' Nat.';
  if(monto>0) ha += ' | '+(f.cobrado?'✅ '+f.metodoPago:'⏳ pendiente')+': '+fmtMoney(monto);
  if(f.repartidor) ha += ' | 👤 '+repNombre(f.repartidor);

  for(var i=0;i<S.clients.length;i++){
    if(S.clients[i].id === c.id){
      S.clients[i].proximaEntrega = addMonths(fechaHoy, 1);
      S.clients[i].dispenserFrioCalor = Math.max(0, (S.clients[i].dispenserFrioCalor||0)+fcE-fcR);
      S.clients[i].historial = [{fecha:fechaHoy,accion:ha}].concat(S.clients[i].historial||[]);
      S.selected = S.clients[i];
      break;
    }
  }

  if(monto>0){
    var pago = {
      id: Date.now()+1, clienteId: c.id, clienteNombre: c.nombre, fecha: fechaHoy,
      monto: monto, concepto: 'Entrega '+fmtDate(fechaHoy),
      estado: f.cobrado?'pagado':'pendiente',
      metodoPago: f.cobrado?f.metodoPago:'', repartidor: f.repartidor,
      comprobante: f.comprobante||''
    };
    S.pagos.push(pago);
    savePagoApi(pago);
  }

  S.stock.bidonesLlenos = Math.max(0, (S.stock.bidonesLlenos||0)-bid);
  S.stock.bidonesVacios = (S.stock.bidonesVacios||0)+bid;
  S.stock.fcDisponibles = Math.max(0, (S.stock.fcDisponibles||0)-fcE+fcR);
  S.stock.fcEnCasas = Math.max(0, (S.stock.fcEnCasas||0)+fcE-fcR);
  S.stock.natDisponibles = Math.max(0, (S.stock.natDisponibles||0)-natV);
  saveStockApi({
    fcDisponibles: S.stock.fcDisponibles, fcEnCasas: S.stock.fcEnCasas,
    fcReparacion: S.stock.fcReparacion, natDisponibles: S.stock.natDisponibles,
    bidonesLlenos: S.stock.bidonesLlenos, bidonesVacios: S.stock.bidonesVacios,
    fecha: fechaHoy, nota: 'Entrega '+c.nombre
  });

  saveClients();
  S.modal = null; S.entregaForm = emptyEF();
  showToast('✅ Entrega registrada');
  render();
}

function filteredClients(){
  var list = S.clients.slice();
  if(S.filter!=='todos' && S.filter!=='pausados')
    list = list.filter(function(c){return c.estado==='activo';});
  if(S.filter==='pausados')
    list = list.filter(function(c){return c.estado==='pausado';});
  if(S.search.trim()){
    var q = S.search.toLowerCase();
    list = list.filter(function(c){
      return c.nombre.toLowerCase().indexOf(q)>=0 ||
        c.direccion.toLowerCase().indexOf(q)>=0 ||
        (c.barrio||'').toLowerCase().indexOf(q)>=0 ||
        (c.zona||'').toLowerCase().indexOf(q)>=0 ||
        String(c.nroCliente).indexOf(q)>=0;
    });
  }
  if(S.filter==='urg') list = list.filter(function(c){var d=daysUntil(c.proximaEntrega);return d>=0&&d<=5;});
  if(S.filter==='ovd') list = list.filter(function(c){return daysUntil(c.proximaEntrega)<0;});
  if(S.filter==='deuda') list = list.filter(function(c){return cDeuda(c.id)>0;});
  if(S.ordenar==='proxima') list.sort(function(a,b){return new Date(cleanDate(a.proximaEntrega))-new Date(cleanDate(b.proximaEntrega));});
  if(S.ordenar==='nombre') list.sort(function(a,b){return a.nombre.localeCompare(b.nombre);});
  if(S.ordenar==='nro') list.sort(function(a,b){return (parseInt(a.nroCliente)||0)-(parseInt(b.nroCliente)||0);});
  if(S.ordenar==='barrio') list.sort(function(a,b){return (a.barrio||'').localeCompare(b.barrio||'');});
  if(S.ordenar==='zona') list.sort(function(a,b){return (a.zona||'').localeCompare(b.zona||'');});
  return list;
}

function buildHoy(){
  var hoy = S.clients.filter(function(c){return c.estado==='activo'&&daysUntil(c.proximaEntrega)===0;});
  var semana = S.clients.filter(function(c){return c.estado==='activo'&&daysUntil(c.proximaEntrega)>0&&daysUntil(c.proximaEntrega)<=7;}).sort(function(a,b){return daysUntil(a.proximaEntrega)-daysUntil(b.proximaEntrega);});
  var venc = S.clients.filter(function(c){return c.estado==='activo'&&daysUntil(c.proximaEntrega)<0;});
  var pend = S.pagos.filter(function(p){return p.estado==='pendiente';});

  var html = '';
  if(S.loading) return '<div class="spinner"></div>';

  // Cajas
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">';
  REPARTIDORES.forEach(function(r){

  }

  return html;
}

        .map(function(x){return '<div style="text-align:center"><div style="font-weight:900;font-size:17px">'+x.v+'</div><div style="font-size:8px;color:#64748b;font-weight:700">'+x.l+'</div></div>';}).join('')+

          '<div class="chips" style="margin-top:5px">'+
          '<span class="chip" style="background:#dbeafe;color:#1d4ed8">🫙 '+e.bidones+' bid.</span>'+

          '<div style="display:flex;align-items:center;gap:6px">'+

function buildPagos(){
  var pend = S.pagos.filter(function(p){return p.estado==='pendiente';}).sort(function(a,b){return new Date(cleanDate(a.fecha))-new Date(cleanDate(b.fecha));});
  var rec = S.pagos.filter(function(p){return p.estado==='pagado';}).sort(function(a,b){return new Date(cleanDate(b.fecha))-new Date(cleanDate(a.fecha));}).slice(0,15);
  var mes = today().slice(0,7);
  var efMes = S.pagos.filter(function(p){return p.estado==='pagado'&&p.metodoPago==='efectivo'&&cleanDate(p.fecha).indexOf(mes)===0;}).reduce(function(a,p){return a+Number(p.monto);},0);
  var trMes = S.pagos.filter(function(p){return p.estado==='pagado'&&p.metodoPago==='transferencia'&&cleanDate(p.fecha).indexOf(mes)===0;}).reduce(function(a,p){return a+Number(p.monto);},0);

  var html = '<div class="st">💰 Pagos</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">'+
    '<div class="card ok" style="text-align:center"><div style="font-size:9px;color:#64748b;font-weight:700">💵 EFECTIVO (mes)</div><div style="font-weight:900;font-size:15px;color:#22c55e">'+fmtMoney(efMes)+'</div></div>'+
    '<div class="card" style="text-align:center;border-color:#93c5fd;background:#eff6ff"><div style="font-size:9px;color:#64748b;font-weight:700">🏦 TRANSFER. (mes)</div><div style="font-weight:900;font-size:15px;color:#0ea5e9">'+fmtMoney(trMes)+'</div></div>'+
    '</div>';

  if(pend.length>0){
    html += '<div class="card"><div class="st">🔴 Pendientes ('+pend.length+')</div>';
    pend.forEach(function(p){
      html += '<div class="pr"><div><div class="pn">'+p.clienteNombre+'</div><div class="pf">'+p.concepto+' — '+fmtDate(p.fecha)+'</div></div>'+
        '<div style="display:flex;align-items:center;gap:6px"><div class="pm">'+fmtMoney(p.monto)+'</div><button class="btn bs bsm" data-pid="'+p.id+'">✓</button></div></div>';
    });
    html += '</div>';
  }

  html += '<div class="card"><div class="st">✅ Últimos cobros</div>';
  if(rec.length===0) html += '<div style="color:#64748b;font-size:12px">Sin cobros</div>';
  else {
    rec.forEach(function(p){
      html += '<div class="pr"><div><div class="pn">'+p.clienteNombre+'</div><div class="pf">'+p.concepto+' — '+fmtDate(p.fecha)+
        (p.metodoPago?' · '+(p.metodoPago==='efectivo'?'💵':'🏦'):'')+
        (p.repartidor?' · '+repNombre(p.repartidor):'')+'</div></div><div class="pm">'+fmtMoney(p.monto)+'</div></div>';
    });
  }
  html += '</div>';

  html += '<div class="card"><div class="st">➕ Registrar cobro</div>'+
    '<div class="fg"><label class="fl">Cliente</label><select class="fi" id="gPC"><option value="">Seleccioná...</option>'+
    S.clients.filter(function(c){return c.estado==='activo';}).sort(function(a,b){return a.nombre.localeCompare(b.nombre);}).map(function(c){return '<option value="'+c.id+'">#'+c.nroCliente+' '+c.nombre+'</option>';}).join('')+
    '</select></div>'+
    '<div class="fr">'+
    '<div class="fg"><label class="fl">Monto</label><input class="fi" id="gPM" type="number" placeholder="0"></div>'+
    '<div class="fg"><label class="fl">Estado</label><select class="fi" id="gPE"><option value="pagado">Pagado</option><option value="pendiente">Pendiente</option></select></div>'+
    '</div>'+
    '<div class="fg"><label class="fl">💳 Método</label>'+
    '<div class="metb">'+
    '<button type="button" class="mebn ef" data-gmet="efectivo">💵 Efectivo</button>'+
    '<button type="button" class="mebn tr" data-gmet="transferencia">🏦 Transferencia</button>'+
    '</div><input type="hidden" id="gPMet" value=""></div>'+
    '<div class="fg"><label class="fl">Concepto</label><input class="fi" id="gPCon" type="text" value="Entrega mensual"></div>'+
    '<button class="btn bp bb" id="gAdd">💰 Registrar</button></div>';

  return html;
}

function buildStock(){
  var st = S.stock;
  var fcEnCasas = S.clients.filter(function(c){return c.estado==='activo';}).reduce(function(a,c){return a+(c.dispenserFrioCalor||0);},0);
  var totalFC = (st.fcDisponibles||0)+fcEnCasas+(st.fcReparacion||0);
  var totalBid = (st.bidonesLlenos||0)+(st.bidonesVacios||0);
  var pctFC = totalFC>0?Math.round(((st.fcDisponibles||0)/totalFC)*100):0;
  var pctBid = totalBid>0?Math.round(((st.bidonesLlenos||0)/totalBid)*100):0;

  return '<div class="st">📦 Stock</div>'+
    '<div class="card" style="margin-bottom:9px">'+
    '<div style="font-weight:800;font-size:13px;margin-bottom:8px">❄️🔥 Dispensers Frío/Calor</div>'+
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:7px">'+
    [{l:'Disponibles',v:st.fcDisponibles||0,c:'#22c55e',bg:'#dcfce7'},{l:'En casas',v:fcEnCasas,c:'#3b82f6',bg:'#dbeafe'},{l:'Reparación',v:st.fcReparacion||0,c:'#f59e0b',bg:'#fef3c7'}]
      .map(function(x){return '<div style="background:'+x.bg+';border-radius:9px;padding:7px;text-align:center"><div style="font-weight:900;font-size:20px;color:'+x.c+'">'+x.v+'</div><div style="font-size:8px;font-weight:700;color:#64748b">'+x.l+'</div></div>';}).join('')+
    '</div>'+
    '<div class="pb"><div class="pf2" style="width:'+pctFC+'%;background:linear-gradient(90deg,#22c55e,#16a34a)"></div></div>'+
    '<div style="font-size:10px;color:#64748b;margin-top:3px">Total: '+totalFC+' | '+pctFC+'% disponibles</div></div>'+
    '<div class="card" style="margin-bottom:9px">'+
    '<div style="font-weight:800;font-size:13px;margin-bottom:6px">💧 Dispensers Natural</div>'+
    '<div style="text-align:center"><div style="font-weight:900;font-size:38px;color:#0ea5e9">'+(st.natDisponibles||0)+'</div>'+
    '<div style="font-size:12px;color:#64748b;font-weight:600">disponibles para vender</div></div></div>'+
    '<div class="card" style="margin-bottom:9px">'+
    '<div style="font-weight:800;font-size:13px;margin-bottom:7px">🫙 Bidones</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:6px">'+
    '<div style="background:#dcfce7;border-radius:9px;padding:9px;text-align:center"><div style="font-weight:900;font-size:26px;color:#15803d">'+(st.bidonesLlenos||0)+'</div><div style="font-size:9px;font-weight:700;color:#64748b">🫙 LLENOS</div></div>'+
    '<div style="background:#fee2e2;border-radius:9px;padding:9px;text-align:center"><div style="font-weight:900;font-size:26px;color:#dc2626">'+(st.bidonesVacios||0)+'</div><div style="font-size:9px;font-weight:700;color:#64748b">🪣 VACÍOS</div></div>'+
    '</div>'+
    '<div class="pb"><div class="pf2" style="width:'+pctBid+'%;background:linear-gradient(90deg,#22c55e,#16a34a)"></div></div>'+
    '<div style="font-size:10px;color:#64748b;margin-top:3px">'+pctBid+'% llenos</div></div>'+
    '<div class="card"><div class="st">📝 Actualizar stock</div>'+
    '<div style="background:#f0f9ff;border-radius:9px;padding:9px;margin-bottom:9px">'+
    '<div style="font-size:11px;font-weight:700;color:#0ea5e9;margin-bottom:7px">❄️🔥 Dispensers F/C</div>'+
    '<div class="fr">'+
    '<div class="fg"><label class="fl">Disponibles</label><input class="fi" id="sFCd" type="number" min="0" value="'+(st.fcDisponibles||0)+'"></div>'+
    '<div class="fg"><label class="fl">En reparación</label><input class="fi" id="sFCr" type="number" min="0" value="'+(st.fcReparacion||0)+'"></div>'+
    '</div></div>'+
    '<div class="fg"><label class="fl">💧 Dispensers Natural</label><input class="fi" id="sNat" type="number" min="0" value="'+(st.natDisponibles||0)+'"></div>'+
    '<div class="fr">'+
    '<div class="fg"><label class="fl">🫙 Llenos</label><input class="fi" id="sBL" type="number" min="0" value="'+(st.bidonesLlenos||0)+'"></div>'+
    '<div class="fg"><label class="fl">🪣 Vacíos</label><input class="fi" id="sBV" type="number" min="0" value="'+(st.bidonesVacios||0)+'"></div>'+
    '</div>'+
    '<div class="fg"><label class="fl">Nota</label><input class="fi" id="sNota" type="text" placeholder="..."></div>'+
    '<button class="btn bp bb" id="svStock">📦 Guardar</button></div>';
}

function buildReporte(){
  var mes = today().slice(0,7);
  var eM = S.entregas.filter(function(e){return cleanDate(e.fecha).indexOf(mes)===0;});
  var bidM = eM.reduce(function(a,e){return a+Number(e.bidones);},0);
  var fcM = eM.reduce(function(a,e){return a+Number(e.dispenserFCEntregados||0);},0);
  var natM = eM.reduce(function(a,e){return a+Number(e.dispenserNatVendidos||0);},0);
  var ingM = S.pagos.filter(function(p){return p.estado==='pagado'&&cleanDate(p.fecha).indexOf(mes)===0;}).reduce(function(a,p){return a+Number(p.monto);},0);
  var efM = S.pagos.filter(function(p){return p.estado==='pagado'&&p.metodoPago==='efectivo'&&cleanDate(p.fecha).indexOf(mes)===0;}).reduce(function(a,p){return a+Number(p.monto);},0);
  var trM = S.pagos.filter(function(p){return p.estado==='pagado'&&p.metodoPago==='transferencia'&&cleanDate(p.fecha).indexOf(mes)===0;}).reduce(function(a,p){return a+Number(p.monto);},0);
  var conDeuda = S.clients.filter(function(c){return cDeuda(c.id)>0;});
  var mesN = new Date().toLocaleString('es-AR',{month:'long',year:'numeric'});

  var ranking = REPARTIDORES.map(function(r){
    var ents = S.entregas.filter(function(e){return e.repartidor===r.id&&cleanDate(e.fecha).indexOf(mes)===0;});
    var cobrado = S.pagos.filter(function(p){return p.repartidor===r.id&&p.estado==='pagado'&&cleanDate(p.fecha).indexOf(mes)===0;}).reduce(function(a,p){return a+Number(p.monto);},0);
    return {id:r.id,nombre:r.nombre,entregas:ents.length,cobrado:cobrado,bidones:ents.reduce(function(a,e){return a+Number(e.bidones);},0)};
  }).sort(function(a,b){return b.cobrado-a.cobrado;});

  var html = '<div class="st">📊 Reporte del mes</div>'+
    '<div class="card">'+
    '<div class="st" style="font-size:12px;text-transform:capitalize">📅 '+mesN+'</div>'+
    [['🚚 Entregas',eM.length],['🫙 Bidones entregados',bidM],['❄️🔥 Disp. F/C entregados',fcM],['💧 Disp. Natural vendidos',natM],['💰 Cobrado total',fmtMoney(ingM)],['💵 Efectivo',fmtMoney(efM)],['🏦 Transferencia',fmtMoney(trM)],['🔴 Con deuda',conDeuda.length],['💸 Deuda total',fmtMoney(totalDeuda())],['👥 Clientes activos',S.clients.filter(function(c){return c.estado==='activo';}).length]]
      .map(function(x){return '<div class="sr"><span class="sk">'+x[0]+'</span><span class="sv">'+x[1]+'</span></div>';}).join('')+
    '</div>';

  html += '<div class="card"><div class="st">🏆 Ranking repartidores</div>';
  ranking.forEach(function(r,i){
    html += '<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f1f5f9">'+
      '<div style="font-size:18px">'+(i===0?'🥇':i===1?'🥈':'🥉')+'</div>'+
      '<div style="flex:1">'+
      '<div style="font-weight:800;font-size:13px">👤 '+r.nombre+'</div>'+
      '<div style="font-size:10px;color:#64748b">'+r.entregas+' entregas · '+r.bidones+' bidones</div>'+
      '</div>'+
      '<div style="font-weight:900;font-size:14px;color:#22c55e">'+fmtMoney(r.cobrado)+'</div>'+
      '</div>';
  });
  html += '</div>';

  if(conDeuda.length>0){
    html += '<div class="card"><div class="st">💰 Clientes con deuda</div>';
    conDeuda.forEach(function(c){
      html += '<div class="sr"><span class="sk"><span class="nro">#'+c.nroCliente+'</span>'+c.nombre+'</span><span class="sv" style="color:#dc2626">'+fmtMoney(cDeuda(c.id))+'</span></div>';
    });
    html += '</div>';
  }
  return html;
}

function bindEvents(){
  // Select user
  var sels = document.querySelectorAll('[data-selectuser]');
  for(var i=0;i<sels.length;i++){(function(b){b.onclick=function(){setUsuario(b.getAttribute('data-selectuser'));};})(sels[i]);}
  // User switch
  var users = document.querySelectorAll('[data-user]');
  for(var i=0;i<users.length;i++){(function(b){b.onclick=function(){setUsuario(b.getAttribute('data-user'));};})(users[i]);}
  // Tabs
  var tabs = document.querySelectorAll('[data-tab]');
  for(var i=0;i<tabs.length;i++){(function(b){b.onclick=function(){S.tab=b.getAttribute('data-tab');if(S.tab!=='clientes')S.view='lista';render();};})(tabs[i]);}
  // Setup
  var conn = document.getElementById('connectBtn');
  if(conn) conn.onclick = function(){var url=document.getElementById('urlInput').value.trim();if(!url){showToast('⚠️ Ingresá URL');return;}S.scriptUrl=url;localStorage.setItem('aguacontrol_url',url);S.view='lista';fetchAll();};
  var skip = document.getElementById('skipBtn');
  if(skip) skip.onclick = function(){S.view='lista';fetchAll();};
  // FAB
  var fab = document.getElementById('fabBtn');
  if(fab) fab.onclick = function(){S.form=emptyForm();S.view='nuevo';render();};
  // Quick actions
  var qaNew = document.getElementById('qaNew');
  if(qaNew) qaNew.onclick = function(){S.tab='clientes';S.form=emptyForm();S.view='nuevo';render();};
  var qaRef = document.getElementById('qaRef');
  if(qaRef) qaRef.onclick = fetchAll;
  // Arqueo
  var arqs = document.querySelectorAll('[data-arqueo]');
  for(var i=0;i<arqs.length;i++){(function(b){b.onclick=function(e){e.stopPropagation();S.modal='arqueo';S.selected={repartidor:b.getAttribute('data-arqueo')};render();};})(arqs[i]);}
  // Search
  var srch = document.getElementById('srch');
  if(srch) srch.oninput = function(e){S.search=e.target.value;render();};
  // Filters
  var filts = document.querySelectorAll('[data-filter]');
  for(var i=0;i<filts.length;i++){(function(b){b.onclick=function(){S.filter=b.getAttribute('data-filter');render();};})(filts[i]);}
  var rfBtn = document.getElementById('rfBtn');
  if(rfBtn) rfBtn.onclick = fetchAll;
  var ordSel = document.getElementById('ordSel');
  if(ordSel) ordSel.onchange = function(e){S.ordenar=e.target.value;render();};
  // Cards
  var opens = document.querySelectorAll('[data-act="open"]');
  for(var i=0;i<opens.length;i++){
    (function(card){
      card.onclick = function(e){
        if(e.target.closest('[data-act="ent"]')) return;
        var id = parseInt(card.getAttribute('data-id'));
        for(var j=0;j<S.clients.length;j++) if(S.clients[j].id===id){S.selected=S.clients[j];break;}
        S.showConfirmDelete = false; S.detailTab = 'info'; S.view = 'detalle';
        render();
      };
    })(opens[i]);
  }
  var ents = document.querySelectorAll('[data-act="ent"]');
  for(var i=0;i<ents.length;i++){
    (function(b){
      b.onclick = function(e){e.stopPropagation();abrirModalEntrega(parseInt(b.getAttribute('data-cid')));};
    })(ents[i]);
  }
  // Form
  var fields = document.querySelectorAll('[data-f]');
  for(var i=0;i<fields.length;i++){
    (function(inp){
      var k = inp.getAttribute('data-f');
      inp.oninput = function(e){
        if(['bidones','dispenserFrioCalor','dispenserNatural','nroCliente'].indexOf(k)>=0) S.form[k]=parseInt(e.target.value)||0;
        else if(k==='precioPorEntrega') S.form[k]=parseFloat(e.target.value)||0;
        else S.form[k]=e.target.value;
      };
      inp.onchange = function(e){S.form[k]=e.target.value;};
    })(fields[i]);
  }
  var svBtn = document.getElementById('svBtn');
  if(svBtn) svBtn.onclick = saveForm;
  var bkBtn = document.getElementById('bkBtn');
  if(bkBtn) bkBtn.onclick = function(){S.view='lista';S.selected=null;S.form=emptyForm();render();};
  var edBtn = document.getElementById('edBtn');
  if(edBtn) edBtn.onclick = function(){
    var c = S.selected;
    S.form = {
      nroCliente:c.nroCliente,nombre:c.nombre,telefono:c.telefono||'',direccion:c.direccion,
      barrio:c.barrio||'',zona:c.zona||'',fechaInicio:addMonths(c.proximaEntrega,-1),
      bidones:c.bidones,notas:c.notas||'',precioPorEntrega:c.precioPorEntrega||40000,
      fotoUrl:c.fotoUrl||'',dispenserFrioCalor:c.dispenserFrioCalor||0,
      dispenserNatural:c.dispenserNatural||0,estado:c.estado||'activo'
    };
    S.view='editar'; render();
  };
  // Detail tabs
  var dts = document.querySelectorAll('[data-dt]');
  for(var i=0;i<dts.length;i++){(function(b){b.onclick=function(){S.detailTab=b.getAttribute('data-dt');render();};})(dts[i]);}
  // Entregar
  var entBtn = document.getElementById('entBtn');
  if(entBtn) entBtn.onclick = function(){abrirModalEntrega(S.selected.id);};
  var entBtn2 = document.getElementById('entBtn2');
  if(entBtn2) entBtn2.onclick = function(){abrirModalEntrega(S.selected.id);};
  // Cobros
  var pids = document.querySelectorAll('[data-pid]');
  for(var i=0;i<pids.length;i++){(function(b){b.onclick=function(){marcarPagado(parseInt(b.getAttribute('data-pid')));};})(pids[i]);}
  // Pago global
  var gmets = document.querySelectorAll('[data-gmet]');
  for(var i=0;i<gmets.length;i++){
    (function(b){
      b.onclick = function(){
        for(var j=0;j<gmets.length;j++) gmets[j].classList.remove('on');
        b.classList.add('on');
        document.getElementById('gPMet').value = b.getAttribute('data-gmet');
      };
    })(gmets[i]);
  }
  var gAdd = document.getElementById('gAdd');
  if(gAdd) gAdd.onclick = function(){
    agregarPago({
      clienteId: document.getElementById('gPC').value,
      monto: document.getElementById('gPM').value,
      estado: document.getElementById('gPE').value,
      concepto: document.getElementById('gPCon').value,
      metodoPago: document.getElementById('gPMet').value,
      repartidor: S.usuarioActual
    });
  };
  // Stock
  var svStock = document.getElementById('svStock');
  if(svStock) svStock.onclick = function(){
    actualizarStock({
      fcD: document.getElementById('sFCd').value,
      fcR: document.getElementById('sFCr').value,
      natD: document.getElementById('sNat').value,
      bL: document.getElementById('sBL').value,
      bV: document.getElementById('sBV').value,
      nota: document.getElementById('sNota').value
    });
  };
  // Estado cliente
  var psBtn = document.getElementById('psBtn');
  if(psBtn) psBtn.onclick = function(){cambiarEstado(S.selected.id,'pausado');};
  var acBtn = document.getElementById('acBtn');
  if(acBtn) acBtn.onclick = function(){cambiarEstado(S.selected.id,'activo');};
  // Delete
  var dlBtn = document.getElementById('dlBtn');
  if(dlBtn) dlBtn.onclick = function(){S.showConfirmDelete=true;render();};
  var cDl = document.getElementById('cDl');
  if(cDl) cDl.onclick = function(){S.showConfirmDelete=false;render();};
  var cfDl = document.getElementById('cfDl');
  if(cfDl) cfDl.onclick = function(){deleteClient(S.selected.id);};
  // Modal close
  var mClose = document.getElementById('mClose');
  if(mClose) mClose.onclick = function(){S.modal=null;render();};
  var mClose2 = document.getElementById('mClose2');
  if(mClose2) mClose2.onclick = function(){S.modal=null;render();};
  var mOv = document.getElementById('mOv');
  if(mOv) mOv.onclick = function(e){if(e.target===mOv){S.modal=null;render();}};
  // Método entrega
  var mets = document.querySelectorAll('[data-met]');
  for(var i=0;i<mets.length;i++){
    (function(b){
      b.onclick = function(){
        for(var j=0;j<mets.length;j++) mets[j].classList.remove('on');
        b.classList.add('on');
        S.entregaForm.metodoPago = b.getAttribute('data-met');
      };
    })(mets[i]);
  }
  // Repartidor entrega
  var reps = document.querySelectorAll('[data-rep]');
  for(var i=0;i<reps.length;i++){
    (function(b){
      b.onclick = function(){
        for(var j=0;j<reps.length;j++) reps[j].classList.remove('on');
        b.classList.add('on');
        S.entregaForm.repartidor = b.getAttribute('data-rep');
      };
    })(reps[i]);
  }
  // Cobrado changes
  var efCob = document.getElementById('efCob');
  if(efCob) efCob.onchange = function(e){
    document.getElementById('mpb').style.display = e.target.value==='true'?'block':'none';
    S.entregaForm.cobrado = e.target.value==='true';
  };
  // Confirmar entrega
  var cfBtn = document.getElementById('cfBtn');
  if(cfBtn) cfBtn.onclick = function(){
    S.entregaForm.bidones = document.getElementById('efB').value;
    S.entregaForm.dispenserFCEntregados = document.getElementById('efFCE').value;
    S.entregaForm.dispenserFCRetirados = document.getElementById('efFCR').value;
    S.entregaForm.dispenserNatVendidos = document.getElementById('efNat').value;
    S.entregaForm.monto = document.getElementById('efM').value;
    S.entregaForm.cobrado = document.getElementById('efCob').value==='true';
    S.entregaForm.notas = document.getElementById('efN').value;
    S.entregaForm.comprobante = document.getElementById('efComp').value;
    confirmarEntrega();
  };
  // Modal cobrar
  var cmets = document.querySelectorAll('[data-cmet]');
  for(var i=0;i<cmets.length;i++){
    (function(b){
      b.onclick = function(){
        for(var j=0;j<cmets.length;j++) cmets[j].classList.remove('on');
        b.classList.add('on');
        S.cobrarMet = b.getAttribute('data-cmet');
      };
    })(cmets[i]);
  }
  var creps = document.querySelectorAll('[data-crep]');
  for(var i=0;i<creps.length;i++){
    (function(b){
      b.onclick = function(){
        for(var j=0;j<creps.length;j++) creps[j].classList.remove('on');
        b.classList.add('on');
        S.cobrarRep = b.getAttribute('data-crep');
      };
    })(creps[i]);
  }
  var cConf = document.getElementById('cConf');
  if(cConf) cConf.onclick = confirmarCobro;
  // Arqueo
  var arqBtn = document.getElementById('arqBtn');
  if(arqBtn) arqBtn.onclick = function(){
    hacerArqueo(S.selected.repartidor, document.getElementById('arqM').value, document.getElementById('arqN').value);
  };
}

// INIT
if(S.scriptUrl){S.view='lista';render();fetchAll();}else render();
</script>
